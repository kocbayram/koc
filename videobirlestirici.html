<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Video Birleştirici & Sıkıştırıcı</title>
<style>
    * {
        box-sizing: border-box;
        user-select: none;
    }
    body {
        background: #0a0f0a;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }
    .card {
        max-width: 780px;
        width: 100%;
        background: #111a11;
        border-radius: 44px;
        border: 1px solid #2a452a;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
        font-size: 28px;
        text-align: center;
        margin: 0;
        background: linear-gradient(135deg, #d4ff88, #ffdd77);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 600;
    }
    .sub {
        text-align: center;
        color: #bbaa66;
        font-size: 12px;
        border-bottom: 1px solid #2e4a2e;
        padding-bottom: 12px;
        margin-bottom: 18px;
    }
    .drop {
        border: 3px dashed #ffcc55;
        border-radius: 36px;
        background: #0e150e;
        text-align: center;
        padding: 28px 16px;
        cursor: pointer;
        transition: 0.2s;
        margin-bottom: 18px;
    }
    .drop:hover {
        background: #182218;
        border-color: #ffee88;
    }
    .drop span:first-child {
        font-size: 42px;
        display: block;
    }
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        background: #0c120c;
        padding: 10px 16px;
        border-radius: 50px;
        margin: 12px 0;
    }
    .tool {
        background: #1f2a1f;
        padding: 5px 14px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
    }
    .tool label {
        color: #ffdd99;
    }
    select, .tool input {
        background: #000;
        border: 1px solid #5a8a5a;
        color: #ccffaa;
        border-radius: 30px;
        padding: 4px 10px;
        cursor: pointer;
    }
    .video-list {
        max-height: 280px;
        overflow-y: auto;
        background: #0a100a;
        border-radius: 24px;
        padding: 8px;
        margin: 14px 0;
        border: 1px solid #2e4a2e;
    }
    .video-item {
        background: #162216;
        margin: 8px 0;
        padding: 10px 12px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: grab;
        transition: 0.1s;
        border: 1px solid transparent;
    }
    .video-item:active {
        cursor: grabbing;
    }
    .video-item.dragging {
        opacity: 0.3;
        cursor: grabbing;
    }
    .video-item.drag-over {
        border-color: #ffcc55;
        background: #1e3a1e;
    }
    .drag-handle {
        cursor: grab;
        color: #ffcc55;
        font-size: 20px;
        user-select: none;
        width: 28px;
        text-align: center;
    }
    .vid-name {
        font-size: 12px;
        font-weight: 500;
        color: #d4ecd4;
        flex: 1;
        word-break: break-word;
        line-height: 1.3;
    }
    .remove {
        background: #3a2020;
        border: none;
        color: #ff9a9a;
        width: 30px;
        height: 30px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 16px;
        flex-shrink: 0;
        transition: 0.1s;
    }
    .remove:hover {
        background: #5a3030;
        color: #ffcccc;
    }
    .actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        margin: 16px 0;
    }
    .btn-primary {
        background: linear-gradient(95deg, #0d6e46, #1baa72);
        border: none;
        padding: 12px 28px;
        border-radius: 50px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        font-size: 15px;
        transition: 0.2s;
    }
    .btn-primary:hover {
        transform: scale(1.02);
        box-shadow: 0 0 10px #1baa7255;
    }
    .btn-secondary {
        background: #262e1c;
        border: 1px solid #6a7a4a;
        padding: 12px 28px;
        border-radius: 50px;
        font-weight: bold;
        color: #ffdd99;
        cursor: pointer;
        font-size: 15px;
        transition: 0.2s;
    }
    .btn-secondary:hover {
        background: #2e3a22;
    }
    .progress-wrapper {
        margin-top: 20px;
    }
    .progress-bg {
        background: #1f2a1a;
        height: 14px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        transition: width 0.25s ease;
        background: linear-gradient(90deg, #2ecc71, #f1c40f);
        border-radius: 20px;
    }
    .progress-stats {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 12px;
        color: #88aa88;
        font-family: monospace;
    }
    .percentage {
        color: #f1c40f;
        font-weight: bold;
        font-size: 13px;
    }
    .status {
        text-align: center;
        font-size: 12px;
        margin-top: 12px;
        color: #ffd966;
    }
    button:disabled {
        opacity: 0.5;
        pointer-events: none;
        transform: none;
    }
    .footer {
        text-align: center;
        font-size: 12px;
        margin-top: 18px;
        padding-top: 12px;
        border-top: 1px solid #2a3a2a;
        color: #8aa88a;
        font-weight: 500;
        letter-spacing: 1px;
    }
    .mode-badge {
        text-align: center;
        margin-top: 10px;
        font-size: 11px;
        color: #ffaa44;
        background: #1e2a1e;
        display: inline-block;
        padding: 4px 12px;
        border-radius: 30px;
        width: auto;
    }
    .mode-container {
        text-align: center;
        margin-bottom: 5px;
    }
</style>
</head>
<body>
<div class="card">
    <h1>Video Birleştirici & Sıkıştırıcı</h1>
    <div class="sub">✦ Sığdır modu | Ses korunur ✦</div>

    <div class="drop" id="dropzone">
        <span>📂🎥</span>
        <div style="color: #ffdd99; margin-top: 8px;">Videoları sürükle & bırak veya tıkla</div>
        <div style="font-size: 11px; margin-top: 5px;">Tek video = Sıkıştır | Çoklu video = Birleştir</div>
    </div>
    <input type="file" id="fileInput" multiple accept="video/*" style="display: none;">

    <div class="toolbar">
        <div class="tool">
            <label>📐 Çözünürlük</label>
            <select id="resolution">
                <option value="auto">Otomatik</option>
                <option value="1920x1080">16:9 1080p</option>
                <option value="1280x720">16:9 720p</option>
                <option value="1080x1920" selected>🔥 9:16 1080x1920</option>
                <option value="720x1280">9:16 720x1280</option>
            </select>
        </div>
        <div class="tool">
            <label>🎚️ Bitrate</label>
            <input type="range" id="bitrate" min="600" max="1800" value="1100" step="50">
            <span id="bitrateVal" style="color:#aaffaa;">1100</span>
            <span>kbps</span>
        </div>
    </div>

    <div class="mode-container">
        <span class="mode-badge" id="modeBadge">📌 Bekleniyor...</span>
    </div>

    <div class="video-list" id="videoListArea"></div>

    <div class="actions">
        <button class="btn-primary" id="mergeBtn">🔮 İŞLEMİ BAŞLAT</button>
        <button class="btn-secondary" id="clearBtn">🧹 TEMİZLE</button>
    </div>

    <div class="progress-wrapper">
        <div class="progress-bg">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-stats">
            <span>İlerleme</span>
            <span class="percentage" id="percentageText">0%</span>
        </div>
        <div class="status" id="statusMsg">✅ Hazır</div>
    </div>
    
    <div class="footer">
        Bayram KOÇ
    </div>
</div>

<script>
    (function() {
        let videos = [];
        let isProcessing = false;
        let dragSrcIndex = null;
        
        // DOM
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const videoListArea = document.getElementById('videoListArea');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressBar = document.getElementById('progressBar');
        const percentageText = document.getElementById('percentageText');
        const statusSpan = document.getElementById('statusMsg');
        const resolutionSelect = document.getElementById('resolution');
        const bitrateSlider = document.getElementById('bitrate');
        const bitrateVal = document.getElementById('bitrateVal');
        const modeBadge = document.getElementById('modeBadge');
        
        bitrateSlider.oninput = () => bitrateVal.innerText = bitrateSlider.value;
        
        function updateModeBadge() {
            if (videos.length === 0) {
                modeBadge.innerHTML = "📌 Bekleniyor...";
                modeBadge.style.background = "#1e2a1e";
                modeBadge.style.color = "#ffaa44";
            } else if (videos.length === 1) {
                modeBadge.innerHTML = "🗜️ SIKIŞTIRMA MODU (Tek video - boyut küçültülecek)";
                modeBadge.style.background = "#2a3a2a";
                modeBadge.style.color = "#88ffaa";
            } else {
                modeBadge.innerHTML = `🔗 BİRLEŞTİRME MODU (${videos.length} video - sırayla birleştirilecek)`;
                modeBadge.style.background = "#2a2a3a";
                modeBadge.style.color = "#ffaa88";
            }
        }
        
        function setProgress(pct) {
            const percent = Math.min(100, Math.max(0, pct));
            progressBar.style.width = percent + '%';
            percentageText.innerText = Math.floor(percent) + '%';
        }
        
        function updateStatus(msg, isOk = true) {
            statusSpan.innerHTML = isOk ? `✅ ${msg}` : `⚠️ ${msg}`;
        }
        
        function formatBytes(b) {
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            return (b/(1024*1024)).toFixed(2) + ' MB';
        }
        
        async function getMetadata(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                const url = URL.createObjectURL(file);
                let done = false;
                const timeout = setTimeout(() => {
                    if (!done) {
                        done = true;
                        URL.revokeObjectURL(url);
                        resolve({ width: 1280, height: 720, duration: 2 });
                    }
                }, 8000);
                video.onloadedmetadata = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timeout);
                    const info = {
                        width: video.videoWidth || 1280,
                        height: video.videoHeight || 720,
                        duration: video.duration || 1
                    };
                    URL.revokeObjectURL(url);
                    resolve(info);
                };
                video.onerror = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timeout);
                    URL.revokeObjectURL(url);
                    resolve({ width: 1280, height: 720, duration: 2 });
                };
                video.src = url;
                video.load();
            });
        }
        
        async function addVideos(files) {
            const vids = Array.from(files).filter(f => f.type.startsWith('video/'));
            if (!vids.length) return;
            updateStatus(`${vids.length} video analiz ediliyor...`);
            for (const f of vids) {
                const meta = await getMetadata(f);
                videos.push({ file: f, name: f.name, width: meta.width, height: meta.height, duration: meta.duration });
            }
            renderList();
            updateModeBadge();
            updateStatus(`${vids.length} video eklendi. Toplam: ${videos.length}`);
        }
        
        function initDragAndDrop() {
            const items = document.querySelectorAll('.video-item');
            items.forEach(item => {
                item.setAttribute('draggable', 'true');
                
                item.addEventListener('dragstart', (e) => {
                    if (videos.length <= 1) {
                        e.preventDefault();
                        return false;
                    }
                    dragSrcIndex = parseInt(item.dataset.index);
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', dragSrcIndex);
                });
                
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    dragSrcIndex = null;
                });
                
                item.addEventListener('dragover', (e) => {
                    if (videos.length <= 1) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });
                
                item.addEventListener('dragenter', (e) => {
                    if (videos.length <= 1) return;
                    e.preventDefault();
                    item.classList.add('drag-over');
                });
                
                item.addEventListener('dragleave', () => {
                    item.classList.remove('drag-over');
                });
                
                item.addEventListener('drop', (e) => {
                    if (videos.length <= 1) return;
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    const targetIndex = parseInt(item.dataset.index);
                    if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                        const movedItem = videos[dragSrcIndex];
                        videos.splice(dragSrcIndex, 1);
                        videos.splice(targetIndex, 0, movedItem);
                        renderList();
                        updateStatus("Sıralama değiştirildi");
                    }
                });
            });
        }
        
        function renderList() {
            if (!videos.length) {
                videoListArea.innerHTML = '<div style="text-align:center; color:#5f7350; padding: 25px;">📭 Video eklenmedi</div>';
                return;
            }
            let html = '';
            for (let i = 0; i < videos.length; i++) {
                const v = videos[i];
                html += `
                    <div class="video-item" data-index="${i}">
                        <span class="drag-handle">${videos.length > 1 ? '⋮⋮' : '○'}</span>
                        <span class="vid-name">📹 ${v.name}</span>
                        <button class="remove" data-idx="${i}">✖</button>
                    </div>
                `;
            }
            videoListArea.innerHTML = html;
            
            document.querySelectorAll('.remove').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    videos.splice(idx, 1);
                    renderList();
                    updateModeBadge();
                    updateStatus("Video çıkarıldı");
                };
            });
            
            initDragAndDrop();
        }
        
        function getTargetRes() {
            if (resolutionSelect.value === 'auto') {
                let maxW = 0, maxH = 0;
                for (let v of videos) {
                    maxW = Math.max(maxW, v.width);
                    maxH = Math.max(maxH, v.height);
                }
                return { w: Math.min(maxW || 1280, 1920), h: Math.min(maxH || 720, 1920) };
            }
            const [w, h] = resolutionSelect.value.split('x').map(Number);
            return { w, h };
        }
        
        function drawFit(ctx, canvas, videoEl) {
            const cw = canvas.width, ch = canvas.height;
            const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, cw, ch);
            if (!vw || !vh) return;
            const vR = vw / vh;
            const cR = cw / ch;
            let dw, dh, dx, dy;
            if (vR > cR) {
                dw = cw;
                dh = cw / vR;
                dx = 0;
                dy = (ch - dh) / 2;
            } else {
                dh = ch;
                dw = ch * vR;
                dx = (cw - dw) / 2;
                dy = 0;
            }
            ctx.drawImage(videoEl, dx, dy, dw, dh);
        }
        
        async function process() {
            if (videos.length === 0) {
                updateStatus("En az bir video seçin!", false);
                return;
            }
            if (isProcessing) return;
            
            isProcessing = true;
            mergeBtn.disabled = true;
            clearBtn.disabled = true;
            setProgress(0);
            
            const isCompress = videos.length === 1;
            updateStatus(isCompress ? "Sıkıştırma başlatılıyor..." : "Birleştirme başlatılıyor...");
            
            let totalDur = 0;
            for (let v of videos) totalDur += v.duration;
            if (totalDur <= 0) totalDur = 1;
            
            const target = getTargetRes();
            const bitrateValNum = parseInt(bitrateSlider.value) * 1000;
            updateStatus(`${target.w}x${target.h} | ${bitrateValNum/1000} kbps | ${isCompress ? 'Sıkıştırma' : 'Birleştirme'}`);
            
            const canvas = document.createElement('canvas');
            canvas.width = target.w;
            canvas.height = target.h;
            const ctx = canvas.getContext('2d');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const canvasStream = canvas.captureStream(15);
            const videoTrack = canvasStream.getVideoTracks()[0];
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.98;
            masterGain.connect(dest);
            await audioCtx.resume();
            
            const audioTrack = dest.stream.getAudioTracks()[0];
            const finalStream = new MediaStream();
            finalStream.addTrack(videoTrack);
            if (audioTrack) finalStream.addTrack(audioTrack);
            
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('video/webm')) {
                mimeType = 'video/webm';
            } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                mimeType = 'video/mp4';
            }
            
            const recorder = new MediaRecorder(finalStream, {
                mimeType: mimeType,
                videoBitsPerSecond: bitrateValNum,
                audioBitsPerSecond: 96000
            });
            
            let chunks = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            let recorderDone;
            const donePromise = new Promise(resolve => { recorderDone = resolve; });
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const originalSize = videos.reduce((sum, v) => sum + v.file.size, 0);
                const newSize = blob.size;
                const savedPercent = ((originalSize - newSize) / originalSize * 100).toFixed(0);
                a.download = isCompress ? `sıkıştırılmış_${Date.now()}.mp4` : `birlesik_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                if (isCompress) {
                    updateStatus(`Sıkıştırma tamam! ${formatBytes(originalSize)} → ${formatBytes(newSize)} (${savedPercent}% küçüldü) | İndiriliyor`);
                } else {
                    updateStatus(`Birleştirme tamam! ${(newSize/(1024*1024)).toFixed(2)} MB | İndiriliyor`);
                }
                recorderDone();
            };
            
            recorder.start(1000);
            
            let elapsed = 0;
            
            for (let i = 0; i < videos.length; i++) {
                const vid = videos[i];
                const videoEl = document.createElement('video');
                const url = URL.createObjectURL(vid.file);
                videoEl.src = url;
                videoEl.crossOrigin = "anonymous";
                videoEl.preload = "auto";
                
                await new Promise((resolveSegment) => {
                    let intervalId = null;
                    let timeoutId = null;
                    let resolved = false;
                    let sourceNode = null;
                    
                    const cleanup = () => {
                        if (intervalId) clearInterval(intervalId);
                        if (timeoutId) clearTimeout(timeoutId);
                        if (sourceNode) {
                            try { sourceNode.disconnect(); } catch(e) {}
                        }
                        URL.revokeObjectURL(url);
                        videoEl.pause();
                        videoEl.src = '';
                        videoEl.load();
                    };
                    
                    try {
                        sourceNode = audioCtx.createMediaElementSource(videoEl);
                        sourceNode.connect(masterGain);
                    } catch(e) {}
                    
                    const start = () => {
                        videoEl.currentTime = 0;
                        videoEl.play().catch(() => {
                            if (!resolved) {
                                resolved = true;
                                elapsed += vid.duration;
                                setProgress((elapsed / totalDur) * 100);
                                cleanup();
                                resolveSegment();
                            }
                        });
                        
                        intervalId = setInterval(() => {
                            if (resolved) return;
                            if (videoEl.ended || videoEl.currentTime >= vid.duration - 0.05) {
                                if (!resolved) {
                                    resolved = true;
                                    drawFit(ctx, canvas, videoEl);
                                    elapsed += vid.duration;
                                    setProgress((elapsed / totalDur) * 100);
                                    cleanup();
                                    resolveSegment();
                                }
                                return;
                            }
                            drawFit(ctx, canvas, videoEl);
                            const prog = (elapsed + videoEl.currentTime) / totalDur;
                            setProgress(prog * 100);
                        }, 66);
                    };
                    
                    videoEl.onloadeddata = () => {
                        if (timeoutId) clearTimeout(timeoutId);
                        start();
                    };
                    videoEl.onerror = () => {
                        if (!resolved) {
                            resolved = true;
                            elapsed += vid.duration;
                            cleanup();
                            resolveSegment();
                        }
                    };
                    timeoutId = setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            elapsed += vid.duration;
                            cleanup();
                            resolveSegment();
                        }
                    }, 45000);
                    videoEl.load();
                });
                await new Promise(r => setTimeout(r, 50));
            }
            
            setProgress(100);
            updateStatus("İşleniyor, kaydediliyor...");
            
            setTimeout(() => {
                if (recorder.state === 'recording') recorder.stop();
            }, 500);
            
            await donePromise;
            await audioCtx.close();
            isProcessing = false;
            mergeBtn.disabled = false;
            clearBtn.disabled = false;
        }
        
        mergeBtn.onclick = () => {
            if (videos.length === 0) {
                updateStatus("Lütfen en az bir video ekleyin!", false);
                return;
            }
            process().catch(err => {
                console.error(err);
                updateStatus("Hata: " + err.message, false);
                isProcessing = false;
                mergeBtn.disabled = false;
                clearBtn.disabled = false;
            });
        };
        
        clearBtn.onclick = () => {
            if (isProcessing) return;
            videos = [];
            renderList();
            setProgress(0);
            updateModeBadge();
            updateStatus("Temizlendi");
        };
        
        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            if (e.target.files) await addVideos(e.target.files);
            fileInput.value = '';
        };
        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.style.borderColor = "#aaffaa"; };
        dropzone.ondragleave = () => { dropzone.style.borderColor = "#ffcc55"; };
        dropzone.ondrop = async (e) => {
            e.preventDefault();
            dropzone.style.borderColor = "#ffcc55";
            if (e.dataTransfer.files) await addVideos(e.dataTransfer.files);
        };
        
        renderList();
        updateModeBadge();
    })();
</script>
</body>
</html>
