<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Video Birleştirici - Sığdır Modu</title>
<style>
    :root { --ana-renk: #00ff88; --altin-sarisi: #ffd700; --arka-plan: #0a0f0a; --kutu-renk: #121a12; --kenarlik: #243324; }
    * { box-sizing: border-box; }
    body { background-color: var(--arka-plan); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
    .kutu { width: 100%; max-width: 700px; background: var(--kutu-renk); padding: 30px; border-radius: 30px; border: 1px solid var(--kenarlik); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .yukle-alani { border: 3px dashed var(--altin-sarisi); border-radius: 20px; padding: 40px 20px; cursor: pointer; background: rgba(255, 215, 0, 0.02); margin: 20px 0; transition: 0.3s; }
    .yukle-alani:hover { background: rgba(255, 215, 0, 0.08); }
    .video-list { max-height: 250px; overflow-y: auto; margin: 15px 0; text-align: left; background: #0a0f0a; border-radius: 15px; padding: 10px; border: 1px solid var(--kenarlik); }
    .video-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; margin: 5px 0; background: #1a2a1a; border-radius: 10px; cursor: grab; transition: 0.2s; }
    .video-name { flex: 1; font-size: 13px; color: #e0e0e0; }
    .video-size { font-size: 11px; color: var(--altin-sarisi); margin: 0 10px; }
    .remove-vid { background: none; border: none; color: #ff6666; cursor: pointer; font-size: 18px; padding: 0 8px; }
    .btn-emerald { background: linear-gradient(95deg, #0f5e3c, #1b8c5a); border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 5px; transition: 0.2s; }
    .btn-cyan { background: linear-gradient(95deg, #0b6b6b, #15a0a0); border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 5px; }
    .prog-konteynir { height: 12px; background: #1f1e18; border-radius: 20px; margin-top: 15px; overflow: hidden; }
    .prog-cubuk { height: 100%; background: linear-gradient(90deg, #0f5e3c, #2bc48a, #d4af37); width: 0%; transition: width 0.3s; border-radius: 20px; }
    .progress-text { text-align: center; font-size: 12px; color: var(--altin-sarisi); margin-top: 5px; font-family: monospace; }
    .durum { font-size: 13px; margin-top: 12px; color: var(--altin-sarisi); }
    .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
    .control-group { background: #0a0f0a; padding: 8px 15px; border-radius: 30px; border: 1px solid var(--kenarlik); display: flex; align-items: center; gap: 10px; }
    .control-group label { color: var(--altin-sarisi); font-size: 12px; }
    .control-group select, .control-group input { background: #000; color: var(--ana-renk); border: 1px solid var(--altin-sarisi); border-radius: 20px; padding: 5px 10px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="kutu">
    <h1 style="color:var(--ana-renk); font-size:28px; margin-bottom:5px;">🎬 VİDEO BİRLEŞTİRİCİ ✨</h1>
    <div class="yukle-alani" id="dropArea">📂<br><div style="margin-top:10px; color:var(--altin-sarisi)">Videoları sürükle veya tıkla</div></div>
    <input type="file" id="videoInput" accept="video/*" multiple style="display:none">
    
    <div class="controls">
        <div class="control-group">
            <label>📐 ÇÖZÜNÜRLÜK</label>
            <select id="outputRes">
                <option value="auto" selected>OTOMATİK (en büyük)</option>
                <option value="1920x1080">1080p (16:9)</option>
                <option value="1280x720">720p (16:9)</option>
                <option value="854x480">480p (16:9)</option>
                <option value="1080x1920">1080x1920 (9:16 Dikey)</option>
            </select>
        </div>
        <div class="control-group">
            <label>🎚️ SIKIŞTIRMA</label>
            <input type="range" id="qualitySlider" min="30" max="55" value="48" step="1">
            <span id="qualityValue" style="color:var(--ana-renk)">48</span>
        </div>
    </div>
    
    <div class="video-list" id="videoList"></div>
    <div>
        <button class="btn-emerald" id="mergeBtn">🔮 BİRLEŞTİR (MP4)</button>
        <button class="btn-cyan" id="clearBtn">🧹 TEMİZLE</button>
    </div>
    <div class="prog-konteynir" id="pCont"><div class="prog-cubuk" id="pBar"></div></div>
    <div class="progress-text" id="progressPercent">0%</div>
    <div id="st" class="durum">💎 Hazır (Sığdır modu - tüm videolar oranını korur)</div>
</div>

<script>
let videoFiles = [];
let videoResolutions = [];
let isProcessing = false;

// Element Tanımlamaları
const dropArea = document.getElementById('dropArea');
const videoInput = document.getElementById('videoInput');
const videoListDiv = document.getElementById('videoList');
const mergeBtn = document.getElementById('mergeBtn');
const clearBtn = document.getElementById('clearBtn');
const pBar = document.getElementById('pBar');
const progressPercent = document.getElementById('progressPercent');
const stSpan = document.getElementById('st');
const outputResSelect = document.getElementById('outputRes');
const qualitySlider = document.getElementById('qualitySlider');
const qualityValue = document.getElementById('qualityValue');

qualitySlider.oninput = () => qualityValue.textContent = qualitySlider.value;
function updateStatus(msg, isOk = true) { stSpan.innerHTML = `${isOk ? '✨' : '⚠️'} ${msg}`; }
function setProgress(percent) { pBar.style.width = `${Math.min(100, Math.max(0, percent))}%`; progressPercent.innerText = `${Math.floor(percent)}%`; }
function formatBytes(bytes) { 
    if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB'; 
}

async function getVideoResolution(file) {
    return new Promise((resolve) => {
        const video = document.createElement('video');
        const url = URL.createObjectURL(file);
        video.onloadedmetadata = () => { 
            URL.revokeObjectURL(url); 
            resolve({ width: video.videoWidth, height: video.videoHeight }); 
        };
        video.onerror = () => resolve({ width: 1280, height: 720 });
        video.src = url;
    });
}

function renderVideoList() {
    if (!videoFiles.length) { videoListDiv.innerHTML = '<div style="text-align:center; color:#6a5e3a; padding:20px;">📭 Video eklenmedi</div>'; return; }
    videoListDiv.innerHTML = videoFiles.map((file, idx) => {
        const res = videoResolutions[idx] || { width: '?', height: '?' };
        const aspect = res.width && res.height ? (res.width / res.height).toFixed(2) : '?';
        return `<div class="video-item" draggable="true" data-index="${idx}">
            <span class="video-name">🎥 ${file.name}</span>
            <span style="background:#1a3a1a; padding:2px 8px; border-radius:20px; font-size:11px;">${res.width}×${res.height} (oran:${aspect})</span>
            <span class="video-size">${formatBytes(file.size)}</span>
            <button class="remove-vid" onclick="videoFiles.splice(${idx},1);videoResolutions.splice(${idx},1);renderVideoList();">✖</button>
        </div>`;
    }).join('');
}

async function addFiles(files) {
    for (let file of files) { 
        if (file.type.startsWith('video/')) { 
            videoFiles.push(file); 
            videoResolutions.push(await getVideoResolution(file)); 
        } 
    }
    renderVideoList();
}

dropArea.onclick = () => videoInput.click();
videoInput.onchange = async (e) => { await addFiles(Array.from(e.target.files)); videoInput.value = ''; };
clearBtn.onclick = () => { videoFiles = []; videoResolutions = []; renderVideoList(); updateStatus("Temizlendi."); };

function getTargetResolution() {
    if (outputResSelect.value === 'auto') {
        let maxW = 0, maxH = 0;
        videoResolutions.forEach(res => { 
            maxW = Math.max(maxW, res.width || 0); 
            maxH = Math.max(maxH, res.height || 0); 
        });
        return { width: Math.min(maxW || 1280, 1920), height: Math.min(maxH || 720, 1080) };
    }
    const [w, h] = outputResSelect.value.split('x').map(Number);
    return { width: w, height: h };
}

const HEDEF_BOYUT_BYTES = 10 * 1024 * 1024;

function calculateTargetBitrate(toplamSaniye) {
    if (toplamSaniye <= 0) return 800000;
    const sesBitBudgetBytes = toplamSaniye * 8000;
    const videoBudgetBytes = Math.max(HEDEF_BOYUT_BYTES - sesBitBudgetBytes, HEDEF_BOYUT_BYTES * 0.7);
    let videoBitrate = (videoBudgetBytes * 8) / toplamSaniye;
    videoBitrate = Math.min(Math.max(videoBitrate, 300000), 2000000);
    return Math.floor(videoBitrate);
}

// Sığdır (Fit) modu - videolar oranını korur, kenarlarda siyah bant bırakır
function drawVideoFit(ctx, canvas, video) {
    const canvasW = canvas.width;
    const canvasH = canvas.height;
    const videoW = video.videoWidth;
    const videoH = video.videoHeight;
    
    if (!videoW || !videoH) {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvasW, canvasH);
        return;
    }
    
    const videoAspect = videoW / videoH;
    const canvasAspect = canvasW / canvasH;
    
    // Arka plan siyah
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvasW, canvasH);
    
    let drawW, drawH, offsetX, offsetY;
    
    if (videoAspect > canvasAspect) {
        // Video daha yatay -> genişliğe göre ölçekle
        drawW = canvasW;
        drawH = canvasW / videoAspect;
        offsetX = 0;
        offsetY = (canvasH - drawH) / 2;
    } else {
        // Video daha dik -> yüksekliğe göre ölçekle
        drawH = canvasH;
        drawW = canvasH * videoAspect;
        offsetX = (canvasW - drawW) / 2;
        offsetY = 0;
    }
    
    ctx.drawImage(video, offsetX, offsetY, drawW, drawH);
}

async function mergeVideos() {
    if (videoFiles.length < 2 || isProcessing) {
        if(videoFiles.length < 2) updateStatus("En az 2 video seçin!", false);
        return;
    }
    
    isProcessing = true;
    mergeBtn.disabled = true;
    updateStatus("Videolar analiz ediliyor...");
    
    // Toplam süreyi hesapla
    let totalDuration = 0;
    
    for (const f of videoFiles) {
        const v = document.createElement('video');
        v.src = URL.createObjectURL(f);
        await new Promise(r => { 
            v.onloadedmetadata = () => { 
                totalDuration += v.duration; 
                URL.revokeObjectURL(v.src);
                r(); 
            };
            v.onerror = () => { totalDuration += 1; r(); };
        });
    }
    
    if (totalDuration === 0) totalDuration = 1;
    
    const targetRes = getTargetResolution();
    const qualityFactor = parseInt(qualitySlider.value) / 50;
    let targetBitrate = calculateTargetBitrate(totalDuration);
    targetBitrate = Math.floor(targetBitrate * (0.7 + (qualityFactor * 0.6)));
    targetBitrate = Math.min(Math.max(targetBitrate, 300000), 1800000);
    
    const hedefMB = (HEDEF_BOYUT_BYTES / (1024 * 1024)).toFixed(0);
    updateStatus(`🎯 ${hedefMB}MB | ${Math.floor(targetBitrate/1000)}kbps | Sığdır modu`);
    
    const canvas = document.createElement('canvas');
    canvas.width = targetRes.width;
    canvas.height = targetRes.height;
    const ctx = canvas.getContext('2d');
    
    // Ses sistemi - temiz ses için
    const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    const dest = audioContext.createMediaStreamDestination();
    
    const highpassFilter = audioContext.createBiquadFilter();
    highpassFilter.type = "highpass";
    highpassFilter.frequency.value = 80;
    
    const compressor = audioContext.createDynamicsCompressor();
    compressor.threshold.setValueAtTime(-18, audioContext.currentTime);
    compressor.knee.setValueAtTime(30, audioContext.currentTime);
    compressor.ratio.setValueAtTime(10, audioContext.currentTime);
    compressor.attack.setValueAtTime(0.003, audioContext.currentTime);
    compressor.release.setValueAtTime(0.2, audioContext.currentTime);
    
    const gainNode = audioContext.createGain();
    gainNode.gain.value = 0.95;
    
    highpassFilter.connect(compressor);
    compressor.connect(gainNode);
    gainNode.connect(dest);
    
    const canvasStream = canvas.captureStream(30);
    const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
    
    let mimeType = 'video/webm;codecs=vp8';
    if (MediaRecorder.isTypeSupported('video/mp4;codecs=h264,aac')) {
        mimeType = 'video/mp4;codecs=h264,aac';
    }
    
    const recorder = new MediaRecorder(combinedStream, {
        mimeType: mimeType,
        videoBitsPerSecond: targetBitrate,
        audioBitsPerSecond: 64000
    });
    
    const chunks = [];
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    recorder.start(1000);
    
    await audioContext.resume();
    
    let processedTime = 0;
    
    for (let i = 0; i < videoFiles.length; i++) {
        const video = document.createElement('video');
        video.src = URL.createObjectURL(videoFiles[i]);
        video.crossOrigin = "anonymous";
        video.preload = "auto";
        
        await new Promise((resolve) => {
            let resolved = false;
            let timeoutId = setTimeout(() => {
                if(!resolved) {
                    resolved = true;
                    processedTime += (video.duration || 2);
                    resolve();
                }
            }, 30000);
            
            video.onloadeddata = async () => {
                if(resolved) return;
                resolved = true;
                clearTimeout(timeoutId);
                
                try {
                    const source = audioContext.createMediaElementSource(video);
                    source.connect(highpassFilter);
                    await video.play();
                    
                    const duration = video.duration;
                    
                    const renderFrame = () => {
                        if (video.ended) {
                            source.disconnect();
                            processedTime += duration;
                            resolve();
                            return;
                        }
                        
                        // Sığdır (Fit) modu ile çiz
                        drawVideoFit(ctx, canvas, video);
                        
                        const overallProgress = ((processedTime + video.currentTime) / totalDuration) * 100;
                        setProgress(overallProgress);
                        
                        requestAnimationFrame(renderFrame);
                    };
                    
                    renderFrame();
                    
                } catch(e) {
                    console.warn("Video render hatası:", e);
                    processedTime += duration;
                    resolve();
                }
            };
            
            video.onerror = () => {
                if(!resolved) {
                    resolved = true;
                    clearTimeout(timeoutId);
                    processedTime += (video.duration || 2);
                    resolve();
                }
            };
        });
        
        URL.revokeObjectURL(video.src);
    }
    
    setProgress(100);
    updateStatus("Videolar birleştirildi, dosya hazırlanıyor...");
    
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const finalSizeMB = blob.size / (1024 * 1024);
        
        let sizeStatus = blob.size <= HEDEF_BOYUT_BYTES 
            ? `✅ ${finalSizeMB.toFixed(2)} MB (hedef:10MB)` 
            : `⚠️ ${finalSizeMB.toFixed(2)} MB`;
        
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `birlesik_sigdir_${Date.now()}.mp4`;
        a.click();
        
        updateStatus(`${sizeStatus} | Sığdır modu | Başarılı!`, true);
        
        setTimeout(() => URL.revokeObjectURL(a.href), 2000);
        
        isProcessing = false;
        mergeBtn.disabled = false;
        audioContext.close();
    };
    
    setTimeout(() => {
        if(recorder.state === 'recording') recorder.stop();
    }, 500);
}

mergeBtn.onclick = mergeVideos;

// Sürükle-bırak
dropArea.ondragover = (e) => { e.preventDefault(); dropArea.style.borderColor = "#00ff88"; };
dropArea.ondragleave = () => { dropArea.style.borderColor = "var(--altin-sarisi)"; };
dropArea.ondrop = async (e) => {
    e.preventDefault();
    dropArea.style.borderColor = "var(--altin-sarisi)";
    await addFiles(Array.from(e.dataTransfer.files));
};
</script>
</body>
</html>
