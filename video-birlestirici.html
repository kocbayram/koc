<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Video Birleştirici</title>
<style>
    :root { --ana-renk: #00ff88; --altin-sarisi: #ffd700; --arka-plan: #0a0f0a; --kutu-renk: #121a12; --kenarlik: #243324; }
    * { box-sizing: border-box; }
    body { background-color: var(--arka-plan); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
    .kutu { width: 100%; max-width: 700px; background: var(--kutu-renk); padding: 30px; border-radius: 30px; border: 1px solid var(--kenarlik); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .yukle-alani { border: 3px dashed var(--altin-sarisi); border-radius: 20px; padding: 40px 20px; cursor: pointer; background: rgba(255, 215, 0, 0.02); margin: 20px 0; transition: 0.3s; }
    .yukle-alani:hover { background: rgba(255, 215, 0, 0.08); }
    .video-list { max-height: 250px; overflow-y: auto; margin: 15px 0; text-align: left; background: #0a0f0a; border-radius: 15px; padding: 10px; border: 1px solid var(--kenarlik); }
    .video-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; margin: 5px 0; background: #1a2a1a; border-radius: 10px; cursor: grab; transition: 0.2s; }
    .video-item:hover { background: #2a3a2a; }
    .video-name { flex: 1; font-size: 13px; color: #e0e0e0; }
    .video-size { font-size: 11px; color: var(--altin-sarisi); margin: 0 10px; }
    .remove-vid { background: none; border: none; color: #ff6666; cursor: pointer; font-size: 18px; padding: 0 8px; }
    .btn-emerald { background: linear-gradient(95deg, #0f5e3c, #1b8c5a); border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 5px; transition: 0.2s; }
    .btn-emerald:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 5px 15px rgba(27,140,90,0.4); }
    .btn-cyan { background: linear-gradient(95deg, #0b6b6b, #15a0a0); border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 5px; }
    .prog-konteynir { height: 12px; background: #1f1e18; border-radius: 20px; margin-top: 15px; overflow: hidden; }
    .prog-cubuk { height: 100%; background: linear-gradient(90deg, #0f5e3c, #2bc48a, #d4af37); width: 0%; transition: width 0.3s; border-radius: 20px; }
    .progress-text { text-align: center; font-size: 12px; color: var(--altin-sarisi); margin-top: 5px; font-family: monospace; }
    .durum { font-size: 13px; margin-top: 12px; color: var(--altin-sarisi); }
    .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
    .control-group { background: #0a0f0a; padding: 8px 15px; border-radius: 30px; border: 1px solid var(--kenarlik); display: flex; align-items: center; gap: 10px; }
    .control-group label { color: var(--altin-sarisi); font-size: 12px; }
    .control-group select, .control-group input { background: #000; color: var(--ana-renk); border: 1px solid var(--altin-sarisi); border-radius: 20px; padding: 5px 10px; }
    footer { text-align: center; margin-top: 20px; font-size: 11px; color: #7e7250; }
    .deep-seek { text-align: center; font-size: 12px; color: var(--altin-sarisi); margin-bottom: 15px; font-style: italic; }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="kutu">
    <h1 style="color:var(--ana-renk); font-size:28px; margin-bottom:5px;">🎬 VİDEO BİRLEŞTİRİCİ ✨</h1>
    
    
    <div class="yukle-alani" id="dropArea">📂<br><div style="margin-top:10px; color:var(--altin-sarisi)">Videoları sürükle veya tıkla</div></div>
    <input type="file" id="videoInput" accept="video/*" multiple style="display:none">
    
    <div class="controls">
        <div class="control-group">
            <label>📐 ÇÖZÜNÜRLÜK</label>
            <select id="outputRes">
                <option value="auto" selected>OTOMATİK (en büyük)</option>
                <option value="1920x1080">1080p</option>
                <option value="1280x720">720p</option>
                <option value="854x480">480p</option>
            </select>
        </div>
        <div class="control-group">
            <label>🎚️ KALİTE</label>
            <input type="range" id="qualitySlider" min="28" max="45" value="35" step="1">
            <span id="qualityValue" style="color:var(--ana-renk)">35</span>
        </div>
    </div>
    
    <div class="video-list" id="videoList"></div>
    
    <div>
        <button class="btn-emerald" id="mergeBtn">🔮 BİRLEŞTİR (MP4)</button>
        <button class="btn-cyan" id="clearBtn">🧹 TEMİZLE</button>
    </div>
    
    <div class="prog-konteynir" id="pCont"><div class="prog-cubuk" id="pBar"></div></div>
    <div class="progress-text" id="progressPercent">0%</div>
    <div id="st" class="durum">💎 Hazır</div>
   
</div>

<script>
let videoFiles = [];
let isProcessing = false;
let videoResolutions = [];

const dropArea = document.getElementById('dropArea');
const videoInput = document.getElementById('videoInput');
const videoListDiv = document.getElementById('videoList');
const mergeBtn = document.getElementById('mergeBtn');
const clearBtn = document.getElementById('clearBtn');
const pBar = document.getElementById('pBar');
const progressPercent = document.getElementById('progressPercent');
const stSpan = document.getElementById('st');
const outputResSelect = document.getElementById('outputRes');
const qualitySlider = document.getElementById('qualitySlider');
const qualityValue = document.getElementById('qualityValue');

qualitySlider.oninput = () => qualityValue.textContent = qualitySlider.value;

function updateStatus(msg, isOk = true) {
    stSpan.innerHTML = `${isOk ? '✨' : '⚠️'} ${msg}`;
}

function setProgress(percent) {
    const p = Math.min(100, Math.max(0, percent));
    pBar.style.width = `${p}%`;
    progressPercent.innerText = `${Math.floor(p)}%`;
}

function formatBytes(bytes) {
    if (bytes === 0) return '0 MB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

async function getVideoResolution(file) {
    return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        const url = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            URL.revokeObjectURL(url);
            resolve({ width: video.videoWidth, height: video.videoHeight });
        };
        video.onerror = () => resolve({ width: 1280, height: 720 });
        video.src = url;
    });
}

function renderVideoList() {
    if (!videoFiles.length) {
        videoListDiv.innerHTML = '<div style="text-align:center; color:#6a5e3a; padding:20px;">📭 Video eklenmedi</div>';
        return;
    }
    let html = '';
    videoFiles.forEach((file, idx) => {
        const res = videoResolutions[idx] || { width: '?', height: '?' };
        html += `
            <div class="video-item" draggable="true" data-index="${idx}">
                <span class="video-name">🎥 ${escapeHtml(file.name)}</span>
                <span style="background:#1a3a1a; padding:2px 8px; border-radius:20px; font-size:11px;">${res.width}×${res.height}</span>
                <span class="video-size">${formatBytes(file.size)}</span>
                <button class="remove-vid" data-index="${idx}">✖</button>
            </div>
        `;
    });
    videoListDiv.innerHTML = html;
    
    document.querySelectorAll('.remove-vid').forEach(btn => {
        btn.onclick = (e) => {
            const idx = parseInt(btn.getAttribute('data-index'));
            videoFiles.splice(idx, 1);
            videoResolutions.splice(idx, 1);
            renderVideoList();
        };
    });
    
    const items = document.querySelectorAll('.video-item');
    items.forEach(item => {
        item.ondragstart = (e) => {
            dragSrcIndex = parseInt(item.getAttribute('data-index'));
            e.dataTransfer.effectAllowed = 'move';
        };
        item.ondragover = (e) => e.preventDefault();
        item.ondrop = (e) => {
            e.preventDefault();
            const destIndex = parseInt(item.getAttribute('data-index'));
            if (dragSrcIndex === destIndex) return;
            const [moved] = videoFiles.splice(dragSrcIndex, 1);
            const [movedRes] = videoResolutions.splice(dragSrcIndex, 1);
            videoFiles.splice(destIndex, 0, moved);
            videoResolutions.splice(destIndex, 0, movedRes);
            renderVideoList();
            dragSrcIndex = null;
        };
    });
}

let dragSrcIndex = null;

function escapeHtml(str) {
    return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

async function addFiles(files) {
    for (let file of files) {
        if (file.type.startsWith('video/')) {
            videoFiles.push(file);
            const res = await getVideoResolution(file);
            videoResolutions.push(res);
        }
    }
    if (files.length) {
        renderVideoList();
        updateStatus(`${files.length} video eklendi. Toplam: ${videoFiles.length}`);
    }
}

dropArea.onclick = () => videoInput.click();
videoInput.onchange = async (e) => {
    if (e.target.files.length) await addFiles(Array.from(e.target.files));
    videoInput.value = '';
};
dropArea.ondragover = (e) => e.preventDefault();
dropArea.ondrop = async (e) => {
    e.preventDefault();
    if (e.dataTransfer.files.length) await addFiles(Array.from(e.dataTransfer.files));
};
clearBtn.onclick = () => {
    videoFiles = [];
    videoResolutions = [];
    renderVideoList();
    updateStatus("Tüm videolar temizlendi.");
};

function getMaxResolution() {
    if (!videoResolutions.length) return { width: 1920, height: 1080 };
    let maxW = 0, maxH = 0;
    for (const res of videoResolutions) {
        maxW = Math.max(maxW, res.width);
        maxH = Math.max(maxH, res.height);
    }
    return { width: maxW, height: maxH };
}

function getTargetResolution() {
    const selected = outputResSelect.value;
    if (selected === 'auto') return getMaxResolution();
    const [w, h] = selected.split('x').map(Number);
    return { width: w, height: h };
}

function drawVideoFit(ctx, video, targetW, targetH) {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return;
    const scale = Math.min(targetW / vw, targetH / vh);
    const drawW = vw * scale;
    const drawH = vh * scale;
    const offsetX = (targetW - drawW) / 2;
    const offsetY = (targetH - drawH) / 2;
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, targetW, targetH);
    ctx.drawImage(video, offsetX, offsetY, drawW, drawH);
}

async function mergeVideos() {
    if (videoFiles.length < 2) {
        updateStatus("En az 2 video seçin!", false);
        return;
    }
    if (isProcessing) return;
    
    isProcessing = true;
    mergeBtn.disabled = true;
    mergeBtn.textContent = "🔄 Birleştiriliyor...";
    setProgress(0);
    
    const targetRes = getTargetResolution();
    const crf = parseInt(qualitySlider.value);
    updateStatus(`${targetRes.width}x${targetRes.height} - Birleştiriliyor...`);
    
    try {
        const canvas = document.createElement('canvas');
        canvas.width = targetRes.width;
        canvas.height = targetRes.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // TEK bir AudioContext ve TEK bir dest
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const dest = audioContext.createMediaStreamDestination();
        const canvasStream = canvas.captureStream(25);
        const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
        
        let mimeType = 'video/webm';
        if (MediaRecorder.isTypeSupported('video/mp4;codecs=h264,aac')) {
            mimeType = 'video/mp4;codecs=h264,aac';
        }
        
        // Daha yüksek ses kalitesi için bitrate artırıldı
        const bitrate = Math.max(400000, Math.min(2000000, 1800000 - (crf - 28) * 80000));
        
        const recorder = new MediaRecorder(combinedStream, {
            mimeType: mimeType,
            videoBitsPerSecond: bitrate,
            audioBitsPerSecond: 128000  // Ses kalitesi artırıldı (cızırtı için)
        });
        
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
        
        let totalDuration = 0;
        for (const file of videoFiles) {
            const v = document.createElement('video');
            v.src = URL.createObjectURL(file);
            await new Promise(r => { v.onloadedmetadata = () => { totalDuration += v.duration; URL.revokeObjectURL(v.src); r(); }; });
        }
        
        let processedDuration = 0;
        
        // Önce AudioContext'i başlat (kullanıcı etkileşimi ile)
        await audioContext.resume();
        
        recorder.start(250); // Daha büyük buffer (cızırtıyı azaltır)
        setProgress(2);
        
        for (let i = 0; i < videoFiles.length; i++) {
            const file = videoFiles[i];
            const video = document.createElement('video');
            const videoUrl = URL.createObjectURL(file);
            video.src = videoUrl;
            video.muted = false;
            video.playsInline = true;
            video.crossOrigin = "anonymous";
            
            await new Promise(resolve => {
                video.onloadedmetadata = async () => {
                    // Her video için YENİ bir source oluştur
                    const source = audioContext.createMediaElementSource(video);
                    source.connect(dest);
                    // HOPARLÖRE SES VERME (source.connect(audioContext.destination) YOK)
                    
                    await video.play();
                    
                    const duration = video.duration;
                    const startTime = performance.now();
                    
                    const drawFrame = () => {
                        const elapsed = (performance.now() - startTime) / 1000;
                        if (elapsed >= duration || video.ended) {
                            source.disconnect();
                            URL.revokeObjectURL(videoUrl);
                            processedDuration += duration;
                            resolve();
                            return;
                        }
                        
                        if (video.videoWidth && video.videoHeight) {
                            drawVideoFit(ctx, video, targetRes.width, targetRes.height);
                        }
                        
                        const globalProgress = ((processedDuration + elapsed) / totalDuration) * 100;
                        setProgress(globalProgress);
                        requestAnimationFrame(drawFrame);
                    };
                    drawFrame();
                };
            });
        }
        
        // Kaydı bitir
        await new Promise(r => { recorder.onstop = r; setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 1000); });
        
        setProgress(100);
        updateStatus("MP4 hazırlanıyor, indirme başlıyor...");
        
        const blob = new Blob(chunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `birlesik_video_${Date.now()}.mp4`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        
        setTimeout(() => audioContext.close(), 1000);
        
        const totalIn = videoFiles.reduce((s,f) => s + f.size, 0);
        updateStatus(`Başarılı! Çıktı: ${formatBytes(blob.size)} (Girdi: ${formatBytes(totalIn)})`);
        
    } catch (err) {
        console.error(err);
        updateStatus(`Hata: ${err.message}`, false);
    } finally {
        isProcessing = false;
        mergeBtn.disabled = false;
        mergeBtn.textContent = "🔮 BİRLEŞTİR (MP4)";
        setTimeout(() => setProgress(0), 2000);
    }
}

mergeBtn.onclick = mergeVideos;
renderVideoList();
</script>
</body>
</html>
