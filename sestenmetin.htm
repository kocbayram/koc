<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sesten Metin Oluşturucu | Gelişmiş Paylaşım + Karakter Sayacı</title>
    <!-- html2canvas kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --primary: #2563eb;
            --card-bg: #ffffff;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        h1 { 
            font-size: 1.8rem; 
            text-align: center; 
            color: var(--primary); 
            margin: 0 0 6px; 
            font-weight: 800; 
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 28px;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
        }
        textarea {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
            font-family: inherit;
            font-weight: 500;
            line-height: 1.6;
            min-height: 200px;
            outline: none;
            transition: 0.2s;
            resize: vertical;
            background: #ffffff;
            color: #0f172a;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .counter-wrapper {
            display: flex;
            justify-content: space-between;
            margin: 8px 5px 0 5px;
            font-size: 0.75rem;
            color: #64748b;
        }
        .counter-item {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .design-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
        }
        .design-panel h4 {
            font-size: 0.8rem;
            color: #2563eb;
            margin: 0 0 12px 0;
            font-weight: 700;
        }
        .design-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .design-item {
            background: white;
            padding: 5px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .design-item label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
        }
        select {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
        }
        
        .download-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 28px 0 16px 0;
        }
        .action-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .convert-row {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .convert-row button {
            width: 100%;
            max-width: 320px;
            padding: 18px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            font-weight: 800;
        }
        button {
            padding: 14px 8px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f1f5f9;
            color: #1e293b;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-util { background: #e2e8f0; }
        .btn-util:hover { background: #cbd5e1; transform: translateY(-1px); }
        .btn-image { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .btn-image:hover { background: #bbf7d0; transform: translateY(-1px); }
        .btn-share { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .btn-share:hover { background: #bfdbfe; transform: translateY(-1px); }
        .btn-clear { background: #fee2e2; color: #991b1b; }
        .btn-clear:hover { background: #fecaca; }
        .label { 
            font-size: 0.75rem; 
            color: var(--primary); 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        .badge-info {
            display: inline-block;
            font-size: 0.7rem;
            background: #eef2ff;
            color: #2563eb;
            border-radius: 30px;
            padding: 3px 10px;
            margin-left: 8px;
            vertical-align: middle;
        }
        #output {
            min-height: 180px;
            white-space: pre-wrap;
            font-size: 17px;
            font-family: inherit;
            font-weight: 600;
            line-height: 1.65;
            color: #0f172a;
        }
        .date-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
            border-top: 2px solid var(--border);
            padding-top: 15px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 320px;
            width: 90%;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            animation: fadeInUp 0.2s ease;
        }
        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.4rem;
            color: var(--primary);
        }
        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .modal-options button {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px;
            font-size: 1rem;
            justify-content: center;
        }
        .modal-options button:hover {
            background: #eef2ff;
            transform: scale(0.98);
        }
        .close-modal {
            background: #f1f5f9;
            color: #475569;
            margin-top: 8px;
            width: 100%;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 650px) {
            .container { padding: 20px; }
            .download-row, .action-row { gap: 8px; }
            button { padding: 10px 5px; font-size: 0.75rem; }
            .convert-row button { font-size: 1rem; padding: 14px; max-width: 260px; }
            textarea, #output { font-size: 15px; }
            .date-footer { font-size: 0.85rem; }
            .counter-wrapper { font-size: 0.65rem; }
            .design-item { padding: 4px 10px; }
        }
        @media (max-width: 480px) {
            .action-row { gap: 6px; }
            .convert-row button { width: 90%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Sesten Metin Oluşturucu</h1>
    <div style="text-align: center;"><div class="subtitle">Simetrik ve Akıllı Metin Editörü</div></div>
    <textarea id="input" placeholder="Metninizi buraya yazın veya yapıştırın." oninput="updateInputCounter()"></textarea>
    <div class="counter-wrapper">
        <span class="counter-item">📝 Giriş: <span id="inputCount">0</span> karakter</span>
        <span class="counter-item">✨ Çıkış: <span id="outputCount">0</span> karakter</span>
    </div>
    
    <div class="design-panel">
        <h4>🎨 GÖRSEL TASARIM AYARLARI (PNG / JPG)</h4>
        <div class="design-options">
            <div class="design-item">
                <label>🖌️ Arkaplan</label>
                <select id="bgColor">
                    <option value="#FFFFFF">Beyaz</option>
                    <option value="#FFF8E7">Krem</option>
                    <option value="#E8F0FE">Mavi Soft</option>
                    <option value="#F0F0F0">Gri Modern</option>
                    <option value="#FFE4E1" selected>Pudra</option>
                </select>
            </div>
            <div class="design-item">
                <label>📏 Yazı Boyutu</label>
                <select id="fontSize">
                    <option value="48" selected>48px (Varsayılan)</option>
                    <option value="50">50px</option>
                    <option value="52">52px</option>
                </select>
            </div>
            <div class="design-item">
                <label>🎨 Yazı Rengi</label>
                <select id="textColor">
                    <option value="#0f172a">Koyu Gri</option>
                    <option value="#1e293b">Lacivert</option>
                    <option value="#8b4513">Kahve</option>
                    <option value="#b91c1c">Koyu Kırmızı</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="download-row">
        <button class="btn-image" onclick="downloadTxt()">📄 TXT İNDİR</button>
        <button class="btn-image" id="pngGenBtn">🖼️ PNG İNDİR</button>
        <button class="btn-image" id="jpgGenBtn">🎨 JPG İNDİR</button>
    </div>

    <div class="action-row">
        <button class="btn-util" onclick="copyOutput()">📋 KOPYALA</button>
        <button class="btn-share" onclick="openShareModal()">📤 PAYLAŞ</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ TEMİZLE</button>
    </div>

    <div class="convert-row">
        <button class="btn-main" onclick="processText()">✨ DÖNÜŞTÜR</button>
    </div>

    <div class="result-stage">
        <div class="label">
            ✨ DÜZENLENMİŞ METİN 
            <span class="badge-info">Noktalama İşaretleri+Yazım Kuralları</span>
        </div>
        <textarea id="output" placeholder="Dönüştürülmüş metin burada görünecek..."></textarea>
    </div>
    <div class="date-footer" id="dateFooter"></div>
</div>

<div id="shareModal" class="modal">
    <div class="modal-content">
        <h3>📤 Paylaşım Formatı</h3>
        <p style="font-size:0.85rem; color:#4b5563;">Düzenlenmiş metni paylaş</p>
        <div class="modal-options">
            <button onclick="shareAsText()">📄 Metin (TXT)</button>
            <button onclick="shareAsImage('png')">🖼️ PNG Görsel</button>
            <button onclick="shareAsImage('jpeg')">🎨 JPG Görsel</button>
        </div>
        <button class="close-modal" onclick="closeShareModal()">Kapat</button>
    </div>
</div>

<script>
    (function() {
        // --------------------- GENEL DEĞİŞKENLER ---------------------
        const INDENT = "      ";
        let phoneMap = new Map();
        let phoneCounter = 0;
        
        const bgColorSelect = document.getElementById('bgColor');
        const fontSizeSelect = document.getElementById('fontSize');
        const textColorSelect = document.getElementById('textColor');
        
        // --------------------- TELEFON KORUMA ---------------------
        function generatePhonePlaceholder() {
            let letters = "";
            let n = phoneCounter++;
            while (true) {
                let rem = n % 26;
                letters = String.fromCharCode(65 + rem) + letters;
                n = Math.floor(n / 26);
                if (n === 0) break;
            }
            return `{{TEL_${letters}}}`;
        }
        
        function protectPhoneNumbers(text) {
            phoneMap.clear();
            phoneCounter = 0;
            const patterns = [
                /\b0\s+5\d{2}\s+\d{3}\s+\d{2}\s+\d{2}\b/g,
                /\b0\s+[2-4]\d{2}\s+\d{3}\s+\d{2}\s+\d{2}\b/g,
                /\b0\s+5\d{2}\s+\d{3}\s+\d{4}\b/g,
                /\b0\s+[2-4]\d{2}\s+\d{3}\s+\d{4}\b/g,
                /\b0[5][0-9]{9}\b/g,
                /\b0[2-4][0-9]{9}\b/g
            ];
            let result = text;
            patterns.forEach(pattern => {
                result = result.replace(pattern, (match) => {
                    let ph = generatePhonePlaceholder();
                    phoneMap.set(ph, match);
                    return ph;
                });
            });
            return result;
        }
        
        function restorePhoneNumbers(text) {
            let result = text;
            for (let [ph, original] of phoneMap.entries()) {
                result = result.split(ph).join(original);
            }
            return result;
        }
        
        function lineHasPhone(line) {
            if (/{{TEL_[A-Z]+}}/.test(line)) return true;
            const phonePattern = /\b0\s*[5][0-9]{2}\s*[0-9]{3}\s*[0-9]{2}\s*[0-9]{2}\b|\b0\s*[2-4][0-9]{2}\s*[0-9]{3}\s*[0-9]{2}\s*[0-9]{2}\b|\b0[0-9]{10}\b/;
            return phonePattern.test(line);
        }
        
        function convertNumbersToWords(text) {
            let r = text;
            r = r.replace(/\b7\./g, 'yedinci').replace(/\b1\./g, 'birinci').replace(/\b2\./g, 'ikinci').replace(/\b3\./g, 'üçüncü');
            r = r.replace(/\b4\./g, 'dördüncü').replace(/\b5\./g, 'beşinci').replace(/\b6\./g, 'altıncı').replace(/\b8\./g, 'sekizinci');
            r = r.replace(/\b9\./g, 'dokuzuncu').replace(/\b10\./g, 'onuncu');
            r = r.replace(/(?<!\d)7(?!\d)/g, 'yedi').replace(/(?<!\d)0(?!\d)/g, 'sıfır').replace(/(?<!\d)1(?!\d)/g, 'bir');
            r = r.replace(/(?<!\d)2(?!\d)/g, 'iki').replace(/(?<!\d)3(?!\d)/g, 'üç').replace(/(?<!\d)4(?!\d)/g, 'dört');
            r = r.replace(/(?<!\d)5(?!\d)/g, 'beş').replace(/(?<!\d)6(?!\d)/g, 'altı').replace(/(?<!\d)8(?!\d)/g, 'sekiz');
            r = r.replace(/(?<!\d)9(?!\d)/g, 'dokuz').replace(/(?<!\d)10(?!\d)/g, 'on');
            return r;
        }
        
        function fixCommonTypos(t) {
            const corrections = {
                "birşey":"bir şey", "herşey":"her şey", "hiçbirşey":"hiçbir şey", "birşeyler":"bir şeyler",
                "herkez":"herkes", "herzaman":"her zaman", "birebir":"bire bir", "nede":"ne de", "istiyorumki":"istiyorum ki"
            };
            let r = t;
            for (let [wrong, correct] of Object.entries(corrections)) {
                r = r.replace(new RegExp(`\\b${wrong}\\b`, 'gi'), correct);
            }
            return r;
        }
        
        function splitDeDa(t) {
            let r = t;
            const safe = [
                { wrong: /\b(bende)\b/gi, correct: 'ben de' }, { wrong: /\b(sende)\b/gi, correct: 'sen de' },
                { wrong: /\b(onda)\b/gi, correct: 'o da' }, { wrong: /\b(bizde)\b/gi, correct: 'biz de' },
                { wrong: /\b(sizde)\b/gi, correct: 'siz de' }, { wrong: /\b(onlarda)\b/gi, correct: 'onlar da' }
            ];
            for (let item of safe) {
                r = r.replace(item.wrong, (match) => {
                    let isUpper = match[0] === match[0].toUpperCase() && match[0] !== match[0].toLowerCase();
                    let corr = isUpper ? item.correct.charAt(0).toUpperCase() + item.correct.slice(1) : item.correct;
                    return corr;
                });
            }
            r = r.replace(/\b(burda)\b/gi, 'burada').replace(/\b(orda)\b/gi, 'orada');
            return r;
        }
        
        function splitKi(t) {
            const never = ['eğer ki', 'sanki', 'belki', 'çünkü', 'mademki', 'oysaki', 'illaki'];
            let prot = t, ph = [];
            never.forEach((phrase, idx) => {
                let re = new RegExp(`\\b${phrase.replace(' ', '\\s+')}\\b`, 'gi');
                prot = prot.replace(re, (m) => { ph.push(m); return `__NS_${idx}__`; });
            });
            let res = prot.replace(/\b(\w+?)(ki)\b/gi, (m, root) => {
                let safeRoots = ['yok','var','demek','bilmiyorum','bilmez','sanmam','düşünmüyorum','gerek','ister'];
                return safeRoots.includes(root.toLowerCase()) && root.length>1 ? root+' ki' : m;
            });
            for (let i=0;i<ph.length;i++) res = res.replace(`__NS_${i}__`, ph[i]);
            return res;
        }
        
        function splitQuestionParticles(t) {
            let words = t.split(/(\s+)/);
            const suffixes = ["mısın","misin","musun","müsün","mıyım","miyim","muyum","müyüm","mıyız","miyiz","muyuz","müyüz","mılar","miler","mular","müler","mı","mi","mu","mü"];
            const exceptions = ['önemi','kimi','gemini','resmi','cismi','ilmi','seni','beni','annemi','babamı'];
            for (let i=0; i<words.length; i++) {
                let w = words[i];
                if (w.trim() === "") continue;
                let match = w.match(/^([\wğüşıəöçĞÜŞİÖÇ]+)([.!?;:]*)$/i);
                if (!match) continue;
                let base = match[1];
                let lowBase = base.toLocaleLowerCase('tr-TR');
                if (exceptions.includes(lowBase)) continue;
                let foundSuffix = null, len = 0;
                for (let suff of suffixes) {
                    if (lowBase.endsWith(suff)) {
                        foundSuffix = suff;
                        len = suff.length;
                        break;
                    }
                }
                if (foundSuffix) {
                    let root = base.slice(0, -len);
                    let isCap = base.length>0 && base[0]===base[0].toLocaleUpperCase('tr-TR') && base[0]!==base[0].toLocaleLowerCase('tr-TR');
                    let newWord;
                    if (root.length > 0) {
                        let rp = root;
                        if (isCap) rp = rp.charAt(0).toLocaleUpperCase('tr-TR') + rp.slice(1);
                        newWord = rp + ' ' + foundSuffix + '?';
                    } else {
                        let sp = foundSuffix;
                        if (isCap) sp = sp.charAt(0).toLocaleUpperCase('tr-TR') + sp.slice(1);
                        newWord = sp + '?';
                    }
                    words[i] = newWord;
                }
            }
            return words.join('');
        }
        
        function addExclamationToInterjections(t) {
            const interjections = [
                "eyvah","imdat","oh","aah","vah","yazık","bravo","aferin","of","uh","hey","hop","dur","koş",
                "yardım","yangın","yetiş","aman","tüh","vay","be","işte","ha","hı","a","o","e","vah vah",
                "vay be","tüh be","yuh","ay","ah","off","vahvah","hadi","haydi","yahu","bre","lan","behey"
            ];
            let r = t;
            for (let int of interjections) {
                let regex = new RegExp(`\\b(${int.replace(/\s+/g, '\\s+')})\\b(?!\\s*!)(?=[\\s,;:.!?]|$)`, 'gi');
                r = r.replace(regex, (match) => {
                    let clean = match.charAt(0).toLocaleUpperCase('tr-TR') + match.slice(1).replace(/,/g, '');
                    return clean + '!';
                });
            }
            r = r.replace(/!+/g, '!').replace(/! ([a-zğüşıəöç])/g, (_,ch) => `! ${ch.toLocaleUpperCase('tr-TR')}`).replace(/,!/g, '!');
            return r;
        }
        
        function enhanceExclamations(t) {
            let r = t;
            r = r.replace(/\s*\(\s*!\s*\)\s*/g, ' (!) ').replace(/\(!\)/g, '(!)').replace(/!{2,}/g, '!').replace(/!\./g, '!');
            r = r.replace(/! ([a-zğüşıəöç])/g, (_,p) => `! ${p.toLocaleUpperCase('tr-TR')}`);
            r = r.replace(/([a-zA-ZğüşıəöçĞÜŞİÖÇ])\s+!/g, '$1 !').replace(/!(\w)/g, '! $1');
            return r;
        }
        
        function fixPunctuationSpacing(t) {
            let r = t;
            r = r.replace(/\?\./g, '?').replace(/\.\?/g, '?').replace(/!\./g, '!');
            r = r.replace(/\s+([.,!?;:])/g, '$1').replace(/([.,!?;:])([^\s])/g, '$1 $2');
            r = r.replace(/! ([a-zğüşıəöç])/g, (_,p) => `! ${p.toLocaleUpperCase('tr-TR')}`);
            return r;
        }
        
        function addSafeCommas(t) {
            let r = t;
            const conj = ['ama','fakat','ancak','çünkü','yani','lakin','oysa','oysaki'];
            for (let c of conj) r = r.replace(new RegExp(`\\s(${c})\\s`, 'gi'), (_, w) => `, ${w} `);
            return r;
        }
        
        function finalizeText(text) {
            let paragraphs = text.split(/\n\s*\n/);
            let processedParas = paragraphs.map(para => {
                if (para.trim() === "") return "";
                let lines = para.split('\n');
                let processedLines = lines.map(line => {
                    line = line.trim();
                    if (line === "") return "";
                    if (lineHasPhone(line)) return line;
                    
                    const isShortName = /^[A-ZĞÜŞİÖÇ][A-ZĞÜŞİÖÇ\s]+$/.test(line) && line.split(/\s+/).length <= 5 && !/[.!?]$/.test(line);
                    if (isShortName) return line;
                    
                    let segments = [];
                    let remaining = line;
                    const punctuationRegex = /[.!?]+/g;
                    let lastIndex = 0;
                    let match;
                    while ((match = punctuationRegex.exec(remaining)) !== null) {
                        let endIndex = match.index + match[0].length;
                        let sentence = remaining.substring(lastIndex, endIndex).trim();
                        if (sentence) segments.push(sentence);
                        lastIndex = endIndex;
                    }
                    let tail = remaining.substring(lastIndex).trim();
                    if (tail) segments.push(tail);
                    
                    if (segments.length === 0) segments = [line];
                    
                    let fixedSegments = segments.map(seg => {
                        if (lineHasPhone(seg)) return seg;
                        let s = seg.trim();
                        if (!s) return "";
                        let first = s.charAt(0);
                        if (/[a-zğüşıəöç]/i.test(first)) {
                            s = first.toLocaleUpperCase('tr-TR') + s.slice(1);
                        }
                        if (!/[.!?]$/.test(s) && !lineHasPhone(s)) {
                            s += ".";
                        }
                        return s;
                    });
                    
                    let joined = fixedSegments.join(" ");
                    if (joined.length < 45 && joined.split(/\s+/).length <= 5) return joined;
                    else return INDENT + joined;
                });
                return processedLines.join('\n');
            });
            let result = processedParas.join("\n\n");
            result = result.replace(/\.\.+/g, '.');
            return result;
        }
        
        function processText() {
            let raw = document.getElementById('input').value;
            if (!raw.trim()) return;
            
            let protectedText = protectPhoneNumbers(raw);
            let lines = protectedText.split(/\r?\n/);
            let processedLines = lines.map(line => {
                if (line.trim() === "") return "";
                let p = line;
                p = convertNumbersToWords(p);
                p = fixCommonTypos(p);
                p = splitDeDa(p);
                p = splitKi(p);
                p = splitQuestionParticles(p);
                p = addExclamationToInterjections(p);
                p = enhanceExclamations(p);
                p = fixPunctuationSpacing(p);
                p = addSafeCommas(p);
                return p;
            });
            let combined = processedLines.join('\n');
            let finalText = restorePhoneNumbers(combined);
            finalText = finalizeText(finalText);
            finalText = finalText.replace(/eğer , ki/gi, 'eğer ki').replace(/eğer, ki/gi, 'eğer ki');
            finalText = finalText.replace(/\?\./g, '?').replace(/!\./g, '!');
            finalText = finalText.replace(/!([A-Za-zğüşıəöç])/g, '! $1');
            finalText = finalText.replace(/\s+\./g, '.').replace(/\s+\?/g, '?').replace(/\s+\!/g, '!');
            
            document.getElementById('output').value = finalText;
            updateOutputCounter();
            const now = new Date();
            document.getElementById('dateFooter').innerHTML = `📅 ${now.toLocaleDateString('tr-TR')} ${now.toLocaleTimeString('tr-TR')}`;
        }
        
        function updateInputCounter() {
            document.getElementById('inputCount').innerText = document.getElementById('input').value.length;
        }
        function updateOutputCounter() {
            document.getElementById('outputCount').innerText = document.getElementById('output').value.length;
        }
        function copyOutput() {
            let t = document.getElementById('output').value;
            if (!t) { alert("Dönüştürülmüş metin yok."); return; }
            navigator.clipboard.writeText(t);
            alert("✅ Metin panoya kopyalandı!");
        }
        function downloadTxt() {
            let t = document.getElementById('output').value;
            if (!t) return;
            const blob = new Blob(["\uFEFF" + t], {type: 'text/plain;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "metin.txt";
            a.click();
        }
        function clearAll() {
            document.getElementById('input').value = "";
            document.getElementById('output').value = "";
            updateInputCounter();
            updateOutputCounter();
            const now = new Date();
            document.getElementById('dateFooter').innerHTML = `📅 ${now.toLocaleDateString('tr-TR')} ${now.toLocaleTimeString('tr-TR')}`;
        }
        
        // --------------------- GÖRSEL OLUŞTURMA (YUVARLAK KÖŞELİ) ---------------------
        async function generateStyledImage(format) {
            let finalText = document.getElementById('output').value;
            if (!finalText.trim()) {
                if (document.getElementById('input').value.trim()) {
                    processText();
                    finalText = document.getElementById('output').value;
                } else {
                    alert("Lütfen önce metin girin veya dönüştürün!");
                    return null;
                }
            }
            
            const bg = bgColorSelect.value;
            const fontSize = fontSizeSelect.value;
            const textColor = textColorSelect.value;
            const now = new Date();
            const dateStr = now.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'fixed';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '0';
            tempDiv.style.width = '800px';
            tempDiv.style.backgroundColor = bg;
            tempDiv.style.padding = '60px 50px';
            tempDiv.style.display = 'flex';
            tempDiv.style.flexDirection = 'column';
            tempDiv.style.alignItems = 'flex-start';
            tempDiv.style.fontFamily = "'Segoe UI', 'Inter', system-ui, monospace";
            tempDiv.style.borderRadius = '48px';  // Dış kenarlar yuvarlak
            tempDiv.style.overflow = 'hidden';
            
            const textBox = document.createElement('div');
            textBox.style.whiteSpace = 'pre-wrap';
            textBox.style.wordBreak = 'break-word';
            textBox.style.fontSize = `${fontSize}px`;
            textBox.style.color = textColor;
            textBox.style.fontWeight = '500';
            textBox.style.lineHeight = '1.5';
            textBox.style.textAlign = 'left';
            textBox.style.width = '100%';
            textBox.style.padding = '30px 28px';
            textBox.style.backgroundColor = 'rgba(255,255,245,0.9)';
            textBox.style.borderRadius = '28px';  // İç kutu da yuvarlak
            textBox.style.boxShadow = '0 12px 28px rgba(0,0,0,0.08)';
            textBox.innerText = finalText;
            
            const footerInfo = document.createElement('div');
            footerInfo.style.marginTop = '35px';
            footerInfo.style.fontSize = '22px';
            footerInfo.style.color = '#475569';
            footerInfo.style.textAlign = 'center';
            footerInfo.style.width = '100%';
            footerInfo.style.borderTop = '2px solid rgba(0,0,0,0.08)';
            footerInfo.style.paddingTop = '22px';
            footerInfo.style.fontWeight = '500';
            footerInfo.innerHTML = `👨‍💻 Bayram KOÇ  •  📅 ${dateStr}  •  🕒 ${timeStr}`;
            
            tempDiv.appendChild(textBox);
            tempDiv.appendChild(footerInfo);
            document.body.appendChild(tempDiv);
            
            try {
                const canvas = await html2canvas(tempDiv, {
                    scale: 2.6,
                    backgroundColor: bg,
                    logging: false,
                    useCORS: false,
                    borderRadius: '48px'
                });
                document.body.removeChild(tempDiv);
                return canvas.toDataURL(format === 'png' ? 'image/png' : 'image/jpeg', 0.92);
            } catch (err) {
                document.body.removeChild(tempDiv);
                console.error(err);
                alert("Görsel oluşturulamadı!");
                return null;
            }
        }
        
        async function downloadImage(format) {
            const dataUrl = await generateStyledImage(format);
            if (!dataUrl) return;
            const link = document.createElement('a');
            link.download = `metin.${format}`;
            link.href = dataUrl;
            link.click();
            alert(`✅ ${format.toUpperCase()} görseli oluşturuldu!`);
        }
        
        // --------------------- PAYLAŞIM ---------------------
        const modal = document.getElementById('shareModal');
        function openShareModal() {
            if (!document.getElementById('output').value.trim()) {
                alert("⚠️ Paylaşmak için önce metin girin ve Dönüştür butonuna tıklayın.");
                return;
            }
            modal.style.display = 'flex';
        }
        function closeShareModal() { modal.style.display = 'none'; }
        
        async function shareFile(blob, fileName, mimeType) {
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([], fileName)] })) {
                try {
                    await navigator.share({ files: [new File([blob], fileName, { type: mimeType })] });
                    return true;
                } catch (e) { if (e.name !== 'AbortError') console.warn(e); }
            }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
            alert("📁 Paylaşım desteklenmiyor, dosya indirildi.");
            return false;
        }
        
        async function shareAsText() {
            closeShareModal();
            const t = document.getElementById('output').value;
            if (!t.trim()) return;
            const blob = new Blob(["\uFEFF" + t], {type: 'text/plain;charset=utf-8'});
            await shareFile(blob, "metin.txt", "text/plain");
        }
        
        async function shareAsImage(format) {
            closeShareModal();
            const dataUrl = await generateStyledImage(format);
            if (!dataUrl) return;
            const blob = await (await fetch(dataUrl)).blob();
            await shareFile(blob, `metin.${format}`, format === 'png' ? 'image/png' : 'image/jpeg');
        }
        
        window.onclick = (e) => { if (e.target === modal) closeShareModal(); };
        
        document.getElementById('pngGenBtn').onclick = () => downloadImage('png');
        document.getElementById('jpgGenBtn').onclick = () => downloadImage('jpeg');
        
        // --------------------- SAYFA YÜKLENİNCE ---------------------
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            document.getElementById('dateFooter').innerHTML = `📅 ${now.toLocaleDateString('tr-TR')} ${now.toLocaleTimeString('tr-TR')}`;
            updateInputCounter();
            updateOutputCounter();
            document.getElementById('input').addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    processText();
                }
            });
            document.getElementById('output').addEventListener('input', updateOutputCounter);
        });
        
        window.updateInputCounter = updateInputCounter;
        window.updateOutputCounter = updateOutputCounter;
        window.processText = processText;
        window.copyOutput = copyOutput;
        window.downloadTxt = downloadTxt;
        window.clearAll = clearAll;
        window.openShareModal = openShareModal;
        window.closeShareModal = closeShareModal;
        window.shareAsText = shareAsText;
        window.shareAsImage = shareAsImage;
    })();
</script>
</body>
</html>
