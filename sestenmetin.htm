<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sesten Metin Oluşturucu | Son Versiyon - Kesin Çözüm</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --primary: #2563eb;
            --card-bg: #ffffff;
            --border: #cbd5e1;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        h1 { 
            font-size: 1.8rem; 
            text-align: center; 
            color: var(--primary); 
            margin: 0 0 6px; 
            font-weight: 800; 
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 28px;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
        }
        textarea {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
            font-family: inherit;
            line-height: 1.6;
            min-height: 200px;
            outline: none;
            transition: 0.2s;
            resize: vertical;
            background: #ffffff;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .toolbar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 28px 0 24px;
        }
        button {
            padding: 14px 8px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f1f5f9;
            color: #1e293b;
        }
        .btn-main { 
            background: var(--primary); 
            color: white; 
            font-size: 1rem; 
            padding: 16px;
        }
        .btn-main:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-util { background: #e2e8f0; }
        .btn-util:hover { background: #cbd5e1; transform: translateY(-1px); }
        .btn-image { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .btn-image:hover { background: #bbf7d0; transform: translateY(-1px); }
        .btn-share { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .btn-share:hover { background: #bfdbfe; transform: translateY(-1px); }
        .btn-clear { background: #fee2e2; color: #991b1b; }
        .btn-clear:hover { background: #fecaca; }
        
        .full-width {
            grid-column: span 3;
        }
        
        .label { 
            font-size: 0.75rem; 
            color: var(--primary); 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        #output {
            min-height: 180px;
            white-space: pre-wrap;
            font-size: 17px;
            line-height: 1.65;
        }
        @media (max-width: 650px) {
            .container { padding: 20px; }
            .toolbar { gap: 8px; }
            button { padding: 10px 5px; font-size: 0.7rem; }
            .btn-main { font-size: 0.85rem; }
            textarea, #output { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sesten Metin Oluşturucu</h1>
    <div style="text-align: center;">
        <div class="subtitle">Simetrik ve Akıllı Metin Editörü</div>
    </div>
    <textarea id="input" placeholder="Metninizi buraya yazın veya yapıştırın. Sesli not, şiir, dörtlük, liste..."></textarea>
    
    <div class="toolbar">
        <button class="btn-main full-width" onclick="processText()">✨ DÖNÜŞTÜR (Noktalama + İmla + Akıllı Girinti)</button>
        <button class="btn-util" onclick="copyOutput()">📋 KOPYALA</button>
        <button class="btn-util" onclick="downloadTxt()">📄 TXT İNDİR</button>
        <button class="btn-image" onclick="generateImage('png')">🖼️ HD PNG</button>
        <button class="btn-image" onclick="generateImage('jpeg')">🎨 HD JPG</button>
        <button class="btn-share" onclick="openShare()">📤 PAYLAŞ</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ TEMİZLE</button>
    </div>

    <div class="label">✨ DÜZENLENMİŞ METİN (Paragraflar girintili, kısa satırlar düz)</div>
    <textarea id="output" placeholder="Dönüştürülmüş metin burada görünecek..."></textarea>
</div>

<script>
    // =============== METİN DÜZENLEME ===============
    function convertNumbersToWords(text) {
        let r = text;
        r = r.replace(/\b7\./g, 'yedinci').replace(/\b1\./g, 'birinci').replace(/\b2\./g, 'ikinci').replace(/\b3\./g, 'üçüncü');
        r = r.replace(/\b4\./g, 'dördüncü').replace(/\b5\./g, 'beşinci').replace(/\b6\./g, 'altıncı').replace(/\b8\./g, 'sekizinci');
        r = r.replace(/\b9\./g, 'dokuzuncu').replace(/\b10\./g, 'onuncu');
        r = r.replace(/(?<!\d)7(?!\d)/g, 'yedi').replace(/(?<!\d)0(?!\d)/g, 'sıfır').replace(/(?<!\d)1(?!\d)/g, 'bir');
        r = r.replace(/(?<!\d)2(?!\d)/g, 'iki').replace(/(?<!\d)3(?!\d)/g, 'üç').replace(/(?<!\d)4(?!\d)/g, 'dört');
        r = r.replace(/(?<!\d)5(?!\d)/g, 'beş').replace(/(?<!\d)6(?!\d)/g, 'altı').replace(/(?<!\d)8(?!\d)/g, 'sekiz');
        r = r.replace(/(?<!\d)9(?!\d)/g, 'dokuz').replace(/(?<!\d)10(?!\d)/g, 'on');
        return r;
    }
    
    function fixCommonTypos(text) {
        const corrections = {
            "birşey":"bir şey", "herşey":"her şey", "hiçbirşey":"hiçbir şey", "birşeyler":"bir şeyler",
            "herkez":"herkes", "herzaman":"her zaman", "birebir":"bire bir", "nede":"ne de", "istiyorumki":"istiyorum ki"
        };
        let r = text;
        for(let [wrong, correct] of Object.entries(corrections)) {
            r = r.replace(new RegExp(`\\b${wrong}\\b`, 'gi'), correct);
        }
        return r;
    }
    
    function splitDeDa(text) {
        let r = text;
        const safe = [
            { wrong: /\b(bende)\b/gi, correct: 'ben de' }, { wrong: /\b(sende)\b/gi, correct: 'sen de' },
            { wrong: /\b(onda)\b/gi, correct: 'o da' }, { wrong: /\b(bizde)\b/gi, correct: 'biz de' },
            { wrong: /\b(sizde)\b/gi, correct: 'siz de' }, { wrong: /\b(onlarda)\b/gi, correct: 'onlar da' }
        ];
        for(let item of safe) {
            r = r.replace(item.wrong, (match) => {
                if(match[0] === match[0].toUpperCase() && match[0] !== match[0].toLowerCase())
                    return item.correct.charAt(0).toUpperCase() + item.correct.slice(1);
                return item.correct;
            });
        }
        r = r.replace(/\b(burda)\b/gi, 'burada').replace(/\b(orda)\b/gi, 'orada');
        return r;
    }
    
    function splitKi(text) {
        const neverSplit = ['eğer ki', 'sanki', 'belki', 'çünkü', 'mademki', 'oysaki', 'illaki'];
        let prot = text, ph = [];
        neverSplit.forEach((phrase, idx) => {
            let re = new RegExp(`\\b${phrase.replace(' ', '\\s+')}\\b`, 'gi');
            prot = prot.replace(re, (m) => { ph.push(m); return `__NS_${idx}__`; });
        });
        let res = prot.replace(/\b(\w+?)(ki)\b/gi, (m, root, kiPart) => {
            let safeRoots = ['yok','var','demek','bilmiyorum','bilmez','sanmam','düşünmüyorum','gerek','ister'];
            if(safeRoots.includes(root.toLowerCase()) && root.length>1) return root+' '+kiPart;
            return m;
        });
        for(let i=0;i<ph.length;i++) res = res.replace(`__NS_${i}__`, ph[i]);
        return res;
    }
    
    function splitQuestionParticles(text) {
        let words = text.split(/(\s+)/);
        const particles = ['mı','mi','mu','mü'], exceptions = ['önemi','kimi','gemini','resmi','cismi','ilmi','seni','beni','annemi','babamı'];
        for(let i=0;i<words.length;i++) {
            let w = words[i], lower = w.toLowerCase();
            if(lower.length<2) continue;
            for(let p of particles) {
                if(lower.endsWith(p) && !exceptions.includes(lower)) {
                    let base = lower.slice(0,-p.length);
                    if(base.length>=2 && /[a-zğüşıöç]/.test(base)) {
                        let newWord = base + ' ' + p + '?';
                        if(w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase()) newWord = newWord.charAt(0).toUpperCase() + newWord.slice(1);
                        words[i] = newWord;
                        break;
                    }
                }
            }
        }
        return words.join('');
    }
    
    function fixPunctuationSpacing(text) {
        return text.replace(/\s+([.,!?;:])/g, '$1').replace(/([.,!?;:])([^\s])/g, '$1 $2');
    }
    
    function addSafeCommas(text) {
        let r = text;
        const conj = ['ama', 'fakat', 'ancak', 'çünkü', 'yani', 'lakin', 'oysa', 'oysaki'];
        for(let c of conj) {
            r = r.replace(new RegExp(`\\s(${c})\\s`, 'gi'), (match, conjWord) => `, ${conjWord} `);
        }
        return r;
    }
    
    function isShortLine(text) {
        if(text.length < 45 && text.split(/\s+/).length <= 5) return true;
        if(/^[\d\s\(\)\+\-]{8,}$/.test(text.trim())) return true;
        return false;
    }
    
    function finalizeText(text) {
        let paragraphs = text.split(/\n\s*\n/);
        let processedParas = paragraphs.map(para => {
            if(para.trim() === "") return "";
            let lines = para.split('\n');
            let processedLines = lines.map(line => {
                line = line.trim();
                if(line === "") return "";
                let sentences = line.match(/[^.!?]+[.!?]+/g) || [line];
                let fixedSentences = sentences.map(s => {
                    s = s.trim();
                    if(s.length === 0) return "";
                    let firstChar = s.charAt(0);
                    if(/[a-zğüşıöç]/i.test(firstChar)) {
                        s = firstChar.toLocaleUpperCase('tr-TR') + s.slice(1);
                    }
                    if(!/[.!?]$/.test(s)) s += ".";
                    return s;
                });
                let result = fixedSentences.join(" ");
                if(isShortLine(result)) {
                    return result;
                } else {
                    return "      " + result;
                }
            });
            return processedLines.join('\n');
        });
        return processedParas.join("\n\n");
    }
    
    function processText() {
        let raw = document.getElementById('input').value;
        if (!raw.trim()) return;
        let lines = raw.split(/\r?\n/);
        let processedLines = lines.map(line => {
            if(line.trim() === "") return "";
            let p = line;
            p = convertNumbersToWords(p);
            p = fixCommonTypos(p);
            p = splitDeDa(p);
            p = splitKi(p);
            p = splitQuestionParticles(p);
            p = fixPunctuationSpacing(p);
            p = addSafeCommas(p);
            return p;
        });
        let combined = processedLines.join('\n');
        let finalText = finalizeText(combined);
        finalText = finalText.replace(/eğer , ki/gi, 'eğer ki').replace(/eğer, ki/gi, 'eğer ki');
        document.getElementById('output').value = finalText;
    }
    
    function copyOutput() {
        let t = document.getElementById('output').value;
        if(!t) { alert("Dönüştürülmüş metin yok."); return; }
        navigator.clipboard.writeText(t);
        alert("✅ Metin panoya kopyalandı!");
    }
    
    function downloadTxt() {
        let t = document.getElementById('output').value;
        if(!t) return;
        const bom = "\uFEFF";
        const blob = new Blob([bom + t], {type: 'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "duzenlenmis_metin.txt";
        a.click();
    }
    
    function clearAll() {
        document.getElementById('input').value = "";
        document.getElementById('output').value = "";
    }
    
    // =============== EN YÜKSEK KALİTE GÖRSEL (KESİLME SIFIR) ===============
    async function getImageBlob(format) {
        const text = document.getElementById('output').value;
        if (!text.trim()) { alert("Önce metni dönüştürün!"); return null; }
        
        const SCALE = 2.1;
        const BASE_WIDTH = 1900;           // Daha geniş canvas
        const WIDTH = BASE_WIDTH * SCALE;
        const PADDING_X = 220 * SCALE;       // Büyük sol boşluk (kesilmeyi tamamen önler)
        const MAX_W = WIDTH - (PADDING_X * 2);
        
        let fontSize = text.length > 800 ? 74 : 88;
        fontSize = fontSize * SCALE;
        
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.font = `500 ${fontSize}px 'Segoe UI', 'Roboto', Arial, sans-serif`;
        
        const rawLines = text.split(/\r?\n/);
        let finalLines = [];
        for(let line of rawLines) {
            if(line.trim() === "") { finalLines.push(""); continue; }
            
            let hasIndent = line.startsWith("      ");
            let content = hasIndent ? line.substring(6) : line;
            
            if(tempCtx.measureText(line).width <= MAX_W) {
                finalLines.push(line);
            } else {
                let words = content.split(/\s+/);
                let current = hasIndent ? "      " : "";
                for(let w of words) {
                    let test = current ? current + " " + w : (hasIndent ? "      " + w : w);
                    if(tempCtx.measureText(test).width > MAX_W && current !== (hasIndent ? "      " : "")) {
                        finalLines.push(current);
                        current = (hasIndent ? "      " : "") + w;
                    } else {
                        current = test;
                    }
                }
                if(current) finalLines.push(current);
            }
        }
        
        const lineHeight = fontSize * 1.55;
        const textHeight = finalLines.length * lineHeight;
        const minHeight = 1500 * SCALE;
        const calcHeight = textHeight + (600 * SCALE);
        const HEIGHT = Math.max(minHeight, calcHeight);
        
        const canvas = document.createElement('canvas');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        
        ctx.strokeStyle = "#cbd5e1";
        ctx.lineWidth = 18 * SCALE;
        ctx.strokeRect(50, 50, WIDTH - 100, HEIGHT - 100);
        
        ctx.fillStyle = "#0f172a";
        ctx.font = `500 ${fontSize}px 'Segoe UI', 'Roboto', Arial, sans-serif`;
        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        
        let startY = (HEIGHT - (finalLines.length * lineHeight)) / 2;
        if(startY < 180 * SCALE) startY = 180 * SCALE;
        
        for(let i = 0; i < finalLines.length; i++) {
            ctx.fillText(finalLines[i], PADDING_X, startY + (i * lineHeight));
        }
        
        ctx.font = `bold ${42 * SCALE}px 'Segoe UI', Arial`;
        ctx.fillStyle = "#64748b";
        ctx.textAlign = "right";
        ctx.fillText(new Date().toLocaleString('tr-TR'), WIDTH - (200 * SCALE), HEIGHT - (140 * SCALE));
        
        return new Promise(resolve => {
            const mime = format === 'png' ? 'image/png' : 'image/jpeg';
            const quality = format === 'jpeg' ? 1.0 : undefined;
            canvas.toBlob(blob => resolve(blob), mime, quality);
        });
    }
    
    async function generateImage(format) {
        const blob = await getImageBlob(format);
        if(!blob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `girintili_metin.${format === 'png' ? 'png' : 'jpg'}`;
        a.click();
        alert(`✅ En yüksek kaliteli ${format.toUpperCase()} görseli indirildi! (Kesilme yok)`);
    }
    
    async function openShare() {
        const blob = await getImageBlob('png');
        if(!blob) return;
        const file = new File([blob], 'girintili_metin.png', {type: 'image/png'});
        if(navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], title: 'Düzenlenmiş Metin' });
                alert("✅ Paylaşıldı! (Kesilme yok)");
                return;
            } catch(e) { if(e.name !== 'AbortError') console.warn(e); }
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "paylasilacak_metin.png";
        a.click();
        alert("📁 Görsel indirildi. Hiçbir karakter kesilmeden WhatsApp'tan gönderebilirsiniz.");
    }
</script>
</body>
</html>
