    <style>
        :root {

<script>
    (function() {
        // --------------------- GENEL DEФФАХKENLER ---------------------
        const INDENT = "      ";
        let phoneMap = new Map();
        let phoneCounter = 0;
        
        const bgColorSelect = document.getElementById('bgColor');
        const fontSizeSelect = document.getElementById('fontSize');
        const textColorSelect = document.getElementById('textColor');
        const innerBgColorSelect = document.getElementById('innerBgColor');
        
        // VarsayФБlan iУЇ alan rengi Buz BeyazФБ (#F8FAFC) olarak ayarlandФБ
        
        // --------------------- TELEFON KORUMA ---------------------
        function generatePhonePlaceholder() {
            let letters = "";
            let n = phoneCounter++;
            while (true) {
                let rem = n % 26;
                letters = String.fromCharCode(65 + rem) + letters;
                n = Math.floor(n / 26);
                if (n === 0) break;
            }
            return `{{TEL_${letters}}}`;
        }
        
        function protectPhoneNumbers(text) {
            phoneMap.clear();
            phoneCounter = 0;
            const patterns = [
                /\b0\s+5\d{2}\s+\d{3}\s+\d{2}\s+\d{2}\b/g,
                /\b0\s+[2-4]\d{2}\s+\d{3}\s+\d{2}\s+\d{2}\b/g,
                /\b0\s+5\d{2}\s+\d{3}\s+\d{4}\b/g,
                /\b0\s+[2-4]\d{2}\s+\d{3}\s+\d{4}\b/g,
                /\b0[5][0-9]{9}\b/g,
                /\b0[2-4][0-9]{9}\b/g
            ];
            let result = text;
            patterns.forEach(pattern => {
                result = result.replace(pattern, (match) => {
                    let ph = generatePhonePlaceholder();
                    phoneMap.set(ph, match);
                    return ph;
                });
            });
            return result;
        }
        
        function restorePhoneNumbers(text) {
            let result = text;
            for (let [ph, original] of phoneMap.entries()) {
                result = result.split(ph).join(original);
            }
            return result;
        }
        
        function lineHasPhone(line) {
            if (/{{TEL_[A-Z]+}}/.test(line)) return true;
            const phonePattern = /\b0\s*[5][0-9]{2}\s*[0-9]{3}\s*[0-9]{2}\s*[0-9]{2}\b|\b0\s*[2-4][0-9]{2}\s*[0-9]{3}\s*[0-9]{2}\s*[0-9]{2}\b|\b0[0-9]{10}\b/;
            return phonePattern.test(line);
        }
        
        function convertNumbersToWords(text) {
            let r = text;
            r = r.replace(/\b7\./g, 'yedinci').replace(/\b1\./g, 'birinci').replace(/\b2\./g, 'ikinci').replace(/\b3\./g, 'УМУЇУМncУМ');
            r = r.replace(/\b4\./g, 'dУЖrdУМncУМ').replace(/\b5\./g, 'beХinci').replace(/\b6\./g, 'altФБncФБ').replace(/\b8\./g, 'sekizinci');
            r = r.replace(/\b9\./g, 'dokuzuncu').replace(/\b10\./g, 'onuncu');
            r = r.replace(/(?<!\d)7(?!\d)/g, 'yedi').replace(/(?<!\d)0(?!\d)/g, 'sФБfФБr').replace(/(?<!\d)1(?!\d)/g, 'bir');
            r = r.replace(/(?<!\d)2(?!\d)/g, 'iki').replace(/(?<!\d)3(?!\d)/g, 'УМУЇ').replace(/(?<!\d)4(?!\d)/g, 'dУЖrt');
            r = r.replace(/(?<!\d)5(?!\d)/g, 'beХ').replace(/(?<!\d)6(?!\d)/g, 'altФБ').replace(/(?<!\d)8(?!\d)/g, 'sekiz');
            r = r.replace(/(?<!\d)9(?!\d)/g, 'dokuz').replace(/(?<!\d)10(?!\d)/g, 'on');
            return r;
        }
        
        function fixCommonTypos(t) {
            const corrections = {
                "birХey":"bir Хey", "herХey":"her Хey", "hiУЇbirХey":"hiУЇbir Хey", "birХeyler":"bir Хeyler",
                "herkez":"herkes", "herzaman":"her zaman", "birebir":"bire bir", "nede":"ne de", "istiyorumki":"istiyorum ki"
            };
            let r = t;
            for (let [wrong, correct] of Object.entries(corrections)) {
                r = r.replace(new RegExp(`\\b${wrong}\\b`, 'gi'), correct);
            }
            return r;
        }
        
        function splitDeDa(t) {
            let r = t;
            const safe = [
                { wrong: /\b(bende)\b/gi, correct: 'ben de' }, { wrong: /\b(sende)\b/gi, correct: 'sen de' },
                { wrong: /\b(onda)\b/gi, correct: 'o da' }, { wrong: /\b(bizde)\b/gi, correct: 'biz de' },
                { wrong: /\b(sizde)\b/gi, correct: 'siz de' }, { wrong: /\b(onlarda)\b/gi, correct: 'onlar da' }
            ];
            for (let item of safe) {
                r = r.replace(item.wrong, (match) => {
                    let isUpper = match[0] === match[0].toUpperCase() && match[0] !== match[0].toLowerCase();
                    let corr = isUpper ? item.correct.charAt(0).toUpperCase() + item.correct.slice(1) : item.correct;
                    return corr;
                });
            }
            r = r.replace(/\b(burda)\b/gi, 'burada').replace(/\b(orda)\b/gi, 'orada');
            return r;
        }
        
        function splitKi(t) {
            const never = ['eФer ki', 'sanki', 'belki', 'УЇУМnkУМ', 'mademki', 'oysaki', 'illaki'];
            let prot = t, ph = [];
            never.forEach((phrase, idx) => {
                let re = new RegExp(`\\b${phrase.replace(' ', '\\s+')}\\b`, 'gi');
                prot = prot.replace(re, (m) => { ph.push(m); return `__NS_${idx}__`; });
            });
            let res = prot.replace(/\b(\w+?)(ki)\b/gi, (m, root) => {
                let safeRoots = ['yok','var','demek','bilmiyorum','bilmez','sanmam','dУМХУМnmУМyorum','gerek','ister'];
                return safeRoots.includes(root.toLowerCase()) && root.length>1 ? root+' ki' : m;
            });
            for (let i=0;i<ph.length;i++) res = res.replace(`__NS_${i}__`, ph[i]);
            return res;
        }
        
        function splitQuestionParticles(t) {
            let words = t.split(/(\s+)/);
            const suffixes = ["mФБsФБn","misin","musun","mУМsУМn","mФБyФБm","miyim","muyum","mУМyУМm","mФБyФБz","miyiz","muyuz","mУМyУМz","mФБlar","miler","mular","mУМler","mФБ","mi","mu","mУМ"];
            const exceptions = ['УЖnemi','kimi','gemini','resmi','cismi','ilmi','seni','beni','annemi','babamФБ'];
            for (let i=0; i<words.length; i++) {
                let w = words[i];
                if (w.trim() === "") continue;
                let match = w.match(/^([\wФУМХФБЩУЖУЇФУХФАУУ]+)([.!?;:]*)$/i);
                if (!match) continue;
                let base = match[1];
                let lowBase = base.toLocaleLowerCase('tr-TR');
                if (exceptions.includes(lowBase)) continue;
                let foundSuffix = null, len = 0;
                for (let suff of suffixes) {
                    if (lowBase.endsWith(suff)) {
                        foundSuffix = suff;
                        len = suff.length;
                        break;
                    }
                }
                if (foundSuffix) {
                    let root = base.slice(0, -len);
                    let isCap = base.length>0 && base[0]===base[0].toLocaleUpperCase('tr-TR') && base[0]!==base[0].toLocaleLowerCase('tr-TR');
                    let newWord;
                    if (root.length > 0) {
                        let rp = root;
                        if (isCap) rp = rp.charAt(0).toLocaleUpperCase('tr-TR') + rp.slice(1);
                        newWord = rp + ' ' + foundSuffix + '?';
                    } else {
                        let sp = foundSuffix;
                        if (isCap) sp = sp.charAt(0).toLocaleUpperCase('tr-TR') + sp.slice(1);
                        newWord = sp + '?';
                    }
                    words[i] = newWord;
                }
            }
            return words.join('');
        }
        
        function addExclamationToInterjections(t) {
            const interjections = [
                "eyvah","imdat","oh","aah","vah","yazФБk","bravo","aferin","of","uh","hey","hop","dur","koХ",
                "yardФБm","yangФБn","yetiХ","aman","tУМh","vay","be","iХte","ha","hФБ","a","o","e","vah vah",
                "vay be","tУМh be","yuh","ay","ah","off","vahvah","hadi","haydi","yahu","bre","lan","behey"
            ];
            let r = t;
            for (let int of interjections) {
                let regex = new RegExp(`\\b(${int.replace(/\s+/g, '\\s+')})\\b(?!\\s*!)(?=[\\s,;:.!?]|$)`, 'gi');
                r = r.replace(regex, (match) => {
                    let clean = match.charAt(0).toLocaleUpperCase('tr-TR') + match.slice(1).replace(/,/g, '');
                    return clean + '!';
                });
            }
            r = r.replace(/!+/g, '!').replace(/! ([a-zФУМХФБЩУЖУЇ])/g, (_,ch) => `! ${ch.toLocaleUpperCase('tr-TR')}`).replace(/,!/g, '!');
            return r;
        }
        
        function enhanceExclamations(t) {
            let r = t;
            r = r.replace(/\s*\(\s*!\s*\)\s*/g, ' (!) ').replace(/\(!\)/g, '(!)').replace(/!{2,}/g, '!').replace(/!\./g, '!');
            r = r.replace(/! ([a-zФУМХФБЩУЖУЇ])/g, (_,p) => `! ${p.toLocaleUpperCase('tr-TR')}`);
            r = r.replace(/([a-zA-ZФУМХФБЩУЖУЇФУХФАУУ])\s+!/g, '$1 !').replace(/!(\w)/g, '! $1');
            return r;
        }
        
        function fixPunctuationSpacing(t) {
            let r = t;
            r = r.replace(/\?\./g, '?').replace(/\.\?/g, '?').replace(/!\./g, '!');
            r = r.replace(/\s+([.,!?;:])/g, '$1').replace(/([.,!?;:])([^\s])/g, '$1 $2');
            r = r.replace(/! ([a-zФУМХФБЩУЖУЇ])/g, (_,p) => `! ${p.toLocaleUpperCase('tr-TR')}`);

        }
        
        function addSafeCommas(t) {
            let r = t;
            const conj = ['ama','fakat','ancak','УЇУМnkУМ','yani','lakin','oysa','oysaki'];
            for (let c of conj) r = r.replace(new RegExp(`\\s(${c})\\s`, 'gi'), (_, w) => `, ${w} `);

        function finalizeText(text) {
            let paragraphs = text.split(/\n\s*\n/);
            let processedParas = paragraphs.map(para => {
                if (para.trim() === "") return "";
                let lines = para.split('\n');
                let processedLines = lines.map((line, idx) => {
                    line = line.trim();
                    if (line === "") return "";
                    if (lineHasPhone(line)) return line;
                    const isShortName = /^[A-ZФУХФАУУ][A-ZФУХФАУУ\s]+$/.test(line) && line.split(/\s+/).length <= 5 && !/[.!?]$/.test(line);
                    if (isShortName) return line;
                    let segments = [];
                    let remaining = line;
                    const punctuationRegex = /[.!?]+/g;
                    let lastIndex = 0;
                    let match;
                    while ((match = punctuationRegex.exec(remaining)) !== null) {
                        let endIndex = match.index + match[0].length;
                        let sentence = remaining.substring(lastIndex, endIndex).trim();
                        if (sentence) segments.push(sentence);
                        lastIndex = endIndex;
                    }
                    let tail = remaining.substring(lastIndex).trim();
                    if (tail) segments.push(tail);
                    if (segments.length === 0) segments = [line];
                    let fixedSegments = segments.map(seg => {
                        if (lineHasPhone(seg)) return seg;
                        let s = seg.trim();
                        if (!s) return "";
                        let first = s.charAt(0);
                        if (/[a-zФУМХФБЩУЖУЇ]/i.test(first)) {
                            s = first.toLocaleUpperCase('tr-TR') + s.slice(1);
                        }
                        if (!/[.!?]$/.test(s) && !lineHasPhone(s)) {
                            s += ".";
                        }
                        return s;
                    });
                    let joined = fixedSegments.join(" ");
                    if (idx === 0) return INDENT + joined;
                    else {
                        if (joined.length < 45 && joined.split(/\s+/).length <= 5) return joined;
                        else return INDENT + joined;
                    }
                });
                return processedLines.join('\n');
            });
            let result = processedParas.join("\n\n");
            result = result.replace(/\.\.+/g, '.');
            return result;
        }
        
        // Хehir, ilУЇe, kУЖy, mahalle adlarФБna gelen ekleri doФru Хekilde ayarlayan fonksiyon
        function fixLocationSuffixes(text) {

            const apostropheSuffixes = ['a', 'e', 'ФБ', 'i', 'u', 'УМ', 'da', 'de', 'ta', 'te', 'dan', 'den', 'tan', 'ten', 'nФБn', 'nin', 'nun', 'nУМn', 'ya', 'ye', 'na', 'ne', 'yФБ', 'yi', 'yu', 'yУМ'];
            const noApostropheSuffixes = ['lФБ', 'li', 'lu', 'lУМ', 'cФБ', 'ci', 'cu', 'cУМ', 'sФБ', 'si', 'su', 'sУМ', 'lФБk', 'lik', 'luk', 'lУМk', 'cilik'];
            
            locationNames.forEach(name => {

                apostropheSuffixes.forEach(suffix => {

            t = t.replace(/\b([A-ZФУХФАУУ][a-zФУМХФБУЖУЇ]+)\s+([aaeФБiuУМ])\b/gi, (match, city, suffix) => {
                if (city.length >= 3 && !city.match(/^(ve|ile|ki|de|da)$/i)) {

            });

        }

            const typoMap = {

        function advancedLanguageChecks(text) { let t = text; const months = ['ocak','Хubat','mart','nisan','mayФБs','haziran','temmuz','aФustos','eylУМl','ekim','kasФБm','aralФБk']; const days = ['pazartesi','salФБ','УЇarХamba','perХembe','cuma','cumartesi','pazar']; months.forEach(month => { t = t.replace(new RegExp(`\\b${month}\\b`, 'gi'), m => m.charAt(0).toLocaleUpperCase('tr-TR') + m.slice(1).toLocaleLowerCase('tr-TR')); }); days.forEach(day => { t = t.replace(new RegExp(`\\b${day}\\b`, 'gi'), m => m.charAt(0).toLocaleUpperCase('tr-TR') + m.slice(1).toLocaleLowerCase('tr-TR')); }); t = t.replace(/\bya da\b/gi, 'ya da').replace(/\bki\b\s+\?/gi, 'ki?').replace(/[ ]{2,}/g, ' ').replace(/([!?.,]){2,}/g, '$1').replace(/\(\s+/g, '(').replace(/\s+\)/g, ')').replace(/т\s+/g, 'т').replace(/\s+т/g, 'т'); return t.trim(); }
        function advancedPunctuationEnhancer(text) { let t = text; const exclamations = ['mУМjde','eyvah','aman','imdat','yardФБm','bravo','aferin','haydi','hadi','vah','yazФБk','tУМh','vay','hey','dur']; exclamations.forEach(word => { t = t.replace(new RegExp(`\\b(${word})\\b(?!\\s*!)(?=\\s)`, 'gi'), '$1!'); }); t = t.replace(/([^.!?\n]+\b(mФБ|mi|mu|mУМ)\b[^.!?\n]*)(\.)/gi, '$1?').replace(/\b(evet|hayФБr|elbette|УЖrneФin|УЖrnek olarak|aУЇФБkУЇasФБ|kФБsacasФБ)\b/gi, '$&, ').replace(/\s+(ama|fakat|ancak|lakin|УЇУМnkУМ|oysa|oysaki|yani)\s+/gi, ', $1 ').replace(/\.{3,}/g, '...').replace(/"([^"]+)"/g, 'т$1т').replace(/([A-ZУФФАУХУ][a-zУЇФФБУЖХУМ]+)([dD][ae])\b/g, "$1'$2").replace(/(\w+),(\s+)(fakat|ancak|oysa)/gi, "$1;$2$3").replace(/\s+([.,!?;:])/g, '$1').replace(/([.,!?;:])([^\s\n])/g, '$1 $2'); return t; }
        function normalizeSentences(text) { let t = text; t = t.replace(/\r/g, '').replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n'); t = t.split('\n').map(line => { let s = line.trim(); if (!s) return ''; if (!/[.!?:;тІ]$/.test(s)) s += '.'; s = s.replace(/^([a-zУЇФФБУЖХУМ])/, (m, p1) => p1.toLocaleUpperCase('tr-TR')); return s; }).join('\n'); t = t.replace(/\s+(ama|fakat|ancak|lakin|УЇУМnkУМ|yani|oysa|oysaki)\s+/gi, ', $1 ').replace(/\s+(mФБ|mi|mu|mУМ)\./gi, ' $1?').replace(/\.{2,}/g, '.').replace(/\?{2,}/g, '?').replace(/!{2,}/g, '!').replace(/\s+([.,!?;:])/g, '$1').replace(/([.,!?;:])([^\s\n])/g, '$1 $2').replace(/(^|[.!?]\s+)([a-zУЇФФБУЖХУМ])/g, (m, p1, p2) => p1 + p2.toLocaleUpperCase('tr-TR')); return t.trim(); }

        function processText() {

            if (!raw.trim()) return;

            let processedLines = lines.map(line => { if (line.trim() === "") return ""; let p = line; p = convertNumbersToWords(p); p = fixCommonTypos(p); p = splitDeDa(p); p = splitKi(p); p = splitQuestionParticles(p); p = addExclamationToInterjections(p); p = enhanceExclamations(p); p = fixPunctuationSpacing(p); p = addSafeCommas(p); return p; });
            let combined = processedLines.join('\n');
            combined = enhanceTurkishGrammar(combined);
